<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CHARGERS · FRC Team 5409 · Battery Tracker</title>
  <meta name="theme-color" content="#1B3A8C" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --blue:#384293;--black:#000000;
      --red:#FF4D4D;--red-dark:#8B1010;
      --yellow:#F5C800;--green:#39FF14;
      --orange:#FF9933;
      --bg:#01021f;--surface:#0F1526;--surface2:#161E35;
      --border:#1E2D5A;--text:#E8ECF8;--muted:#5A6A99;
      --mono:'Share Tech Mono',monospace;--disp:'Oswald',sans-serif;--body:'Barlow Condensed',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:var(--bg);height:100%;font-family:var(--body);color:var(--text);-webkit-tap-highlight-color:transparent;}
    .app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
    
    .hdr{background:var(--black);border-bottom:3px solid var(--yellow);position:sticky;top:0;z-index:100;}
    .hdr-inner{display:flex;align-items:center;padding:12px 16px;gap:15px;}
    .hdr-title-group{display:flex; flex-direction:column;}
    .hdr-title{font-family:var(--disp);font-size:24px;font-weight:900;letter-spacing:1px;color:var(--yellow);line-height:1;}
    .hdr-subtitle { display: block; font-size: 1rem; font-weight: normal; color: #666; }
    
    .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:73px;z-index:90;}
    .tab{flex:1;padding:14px 5px;font-family:var(--disp);font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;}
    .tab.on{color:var(--yellow);border-bottom-color:var(--yellow);background:rgba(245,200,0,0.05);}
    
    .pg{padding:16px;flex:1;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:20px;overflow:visible;}
    .ch{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);}
    .ct{font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--yellow);}
    .cb{padding:16px; position: relative;}
    .bi{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .bid{font-family:var(--disp);font-size:18px;font-weight:700;}
    
    .inp{width:100%;background:#070B16;border:1px solid var(--border);border-radius:3px;padding:12px;color:var(--text);font-family:var(--mono);margin-bottom:10px;outline:none;}
    .btn-p{width:100%;background:var(--blue);color:white;border:none;padding:14px;font-family:var(--disp);font-size:14px;font-weight:700;text-transform:uppercase;border-radius:3px;cursor:pointer;}
    .btn-qr{background:var(--blue);color:white;border:none;padding:6px 12px;border-radius:3px;font-family:var(--disp);font-size:11px;cursor:pointer;}
    .btn-d{color:var(--red);background:none;border:none;font-size:11px;cursor:pointer;font-family:var(--disp);}
    .back-btn{background:none;border:none;color:var(--yellow);padding:10px 16px;font-family:var(--disp);cursor:pointer;font-weight:700;}

    .ov-grid{display:grid;gap:10px;margin-bottom:10px;}
    .ov-box{background:#070B16;padding:12px;border:1px solid var(--border);border-left:3px solid var(--muted); border-radius:2px;}
    .ov-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
    .ov-val{font-family:var(--disp);font-size:26px;font-weight:700;line-height:1;}
    .ov-sub{font-size:10px; color:var(--muted); margin-top:4px;}

    .comp-tabs { display: flex; background: #070B16; border-radius: 4px; padding: 4px; margin-bottom: 20px; border: 1px solid var(--border);}
    .comp-tab { flex:1; background:none; border:none; color: var(--muted); padding: 8px; font-family: var(--disp); font-size: 10px; font-weight: 700; border-radius: 2px; cursor: pointer; }
    .comp-tab.on { background: var(--surface2); color: var(--yellow); }
    
    .graph-container { position: relative; padding-bottom: 30px; margin-top: 10px; min-height: 100px; overflow: visible;}
    .chart-row { display: flex; align-items: center; margin-bottom: 12px; gap: 8px; position: relative; z-index: 2;}
    .chart-label { width: 45px; font-family: var(--disp); font-weight: 700; font-size: 14px; color: var(--text); text-align: right; }
    .chart-track { flex: 1; background: rgba(255,255,255,0.03); height: 20px; border-radius: 2px; position: relative; border: 1px solid rgba(255,255,255,0.05); overflow: hidden;}
    .chart-bar { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative;}
    .chart-val-label { font-family: var(--mono); font-size: 11px; color: var(--text); min-width: 45px; margin-left: 4px;}

    .bar-overlay-drop { position: absolute; top: 0; left: 0; height: 100%; background: rgba(255,255,255,0.15); }
    
    .grid-lines { position: absolute; top: 0; left: 53px; right: 49px; bottom: 30px; display: flex; justify-content: space-between; pointer-events: none; }
    .grid-line { width: 1px; height: 100%; background: rgba(255,255,255,0.08); }
    .x-axis { position: absolute; bottom: 0; left: 53px; right: 49px; display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 6px; }
    .x-tick { font-family: var(--mono); font-size: 9px; color: var(--muted); position: relative; transform: translateX(-50%); }

    .deep-dive-graph { height: 180px; position: relative; background: rgba(0,0,0,0.25); border: 1px solid var(--border); margin: 10px 0; padding: 10px 10px 30px 40px; overflow: visible; }
    .y-axis-label { position: absolute; left: 8px; top: 50%; transform: rotate(-90deg) translateX(50%); font-family: var(--mono); font-size: 9px; color: var(--muted); transform-origin: left;}
    
    .dot { cursor: pointer; transition: r 0.2s, stroke-width 0.2s; }
    .dot:hover { r: 5; stroke-width: 2; }

    .popover { 
      position: absolute; background: #161E35; border: 1px solid var(--yellow); 
      border-radius: 4px; padding: 10px; z-index: 9999; width: 140px;
      pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.8);
    }
    .pop-title { font-family: var(--disp); font-weight: 700; color: var(--yellow); border-bottom: 1px solid var(--border); margin-bottom: 5px; font-size: 12px;}
    .pop-row { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; margin-bottom: 2px; }

    .rank-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
    .rank-id { font-family: var(--disp); font-weight: 700; font-size: 15px; }
    .rank-stat { font-family: var(--mono); font-size: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const firebaseConfig = { 
        apiKey: "AIzaSyAsP6CNH0Eqhc93hqn2fOwTUlQhff-lAOk",
        authDomain: "battery-tracker-5409.firebaseapp.com",
        projectId: "battery-tracker-5409",
        storageBucket: "battery-tracker-5409.firebasestorage.app",
        messagingSenderId: "48524347",
        appId: "1:48524347:web:1cf4503c4f229f5b09401e"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const App = () => {
      const [page, setPage] = React.useState("home");
      const [tab, setTab] = React.useState("pre");
      const [batteries, setBatteries] = React.useState([]);
      const [records, setRecords] = React.useState([]);
      const [events, setEvents] = React.useState([]);
      const [activeEvent, setActiveEvent] = React.useState(null);
      const [pre, setPre] = React.useState({ match:'', bat:'', v:'', pct:'', ir:'' });

      React.useEffect(() => {
        const u1 = db.collection("batteries").onSnapshot(s => setBatteries(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u2 = db.collection("records").onSnapshot(s => setRecords(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u3 = db.collection("events").orderBy("timestamp", "desc").onSnapshot(s => setEvents(s.docs.map(d => ({id: d.id, ...d.data()}))));
        return () => { u1(); u2(); u3(); };
      }, []);

      const eventRecords = records.filter(r => r.eventId === activeEvent?.id);
      const sortedBats = [...batteries].sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));

      const savePre = () => {
        if(!pre.match || !pre.bat || !pre.v) return alert("Missing Info");
        db.collection("records").add({
          match: pre.match, bat: pre.bat, eventId: activeEvent.id,
          pre: { v: pre.v, pct: pre.pct, ir: pre.ir },
          timestamp: Date.now()
        });
        setPre({ match:'', bat:'', v:'', pct:'', ir:'' });
        setTab("history");
      };

      return (
        <div className="app">
          <div className="hdr">
            <div className="hdr-inner">
              <img src="ChargersLogo.png" alt="Logo" width="45" height="45" />
              <div className="hdr-title-group">
                <div className="hdr-title">5409 CHARGERS ⚡</div>
                <div className="hdr-subtitle">BATTERY TRACKER</div>
              </div>
            </div>
          </div>

          {page === "home" ? (
            <div className="pg">
              <div className="card">
                <div className="ch"><div className="ct">🔋 Batteries</div><button className="btn-qr" onClick={() => {const n = prompt("Name:"); if(n) db.collection("batteries").doc(n.toUpperCase().trim()).set({added: Date.now()})}}>+ Add</button></div>
                <div className="cb" style={{padding:0}}>
                  {sortedBats.map(b => (
                    <div key={b.id} className="bi"><div className="bid">{b.id}</div><button className="btn-d" onClick={() => confirm(`Delete ${b.id}?`) && db.collection("batteries").doc(b.id).delete()}>Delete</button></div>
                  ))}
                </div>
              </div>
              <div className="card">
                <div className="ch">
                  <div className="ct">📁 Events</div>
                  <button className="btn-qr" onClick={() => {const n = prompt("Event Name:"); if(n) db.collection("events").add({name: n, timestamp: Date.now()})}}>+ New</button>
                </div>
                <div className="cb" style={{padding:0}}>
                  {events.map(ev => (
                    <div 
                      key={ev.id} 
                      className="bi" 
                      onClick={() => { setActiveEvent(ev); setPage("event"); }}
                      style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer' }}
                    >
                      <div className="bid">📁 {ev.name}</div>
                      <button 
                        className="btn-d" 
                        onClick={(e) => {
                          e.stopPropagation(); // Prevents navigating to the event page when clicking delete
                          if (confirm(`Delete event "${ev.name}"?`)) {
                            db.collection("events").doc(ev.id).delete();
                          }
                        }}
                      >
                        Delete
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ) : (
            <div style={{display:'flex', flexDirection:'column', flex:1}}>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', paddingRight:16}}>
                <button className="back-btn" onClick={() => setPage("home")}>← BACK</button>
                <div style={{fontFamily:'var(--disp)', fontSize:'12px', color:'var(--yellow)', fontWeight:700}}>{activeEvent?.name}</div>
              </div>
              <div className="tabs">
                {[{id:"pre", label:"📋 PRE"}, {id:"post", label:"⌛ POST"}, {id:"history", label:"📊 HISTORY"}, {id:"stats", label:"📈 STATS"}].map(t => (
                  <button key={t.id} className={`tab ${tab === t.id ? 'on' : ''}`} onClick={() => setTab(t.id)}>{t.label}</button>
                ))}
              </div>
              <div className="pg">
                {tab === "pre" && (
                  <div className="card"><div className="cb">
                    <input className="inp" type="number" placeholder="Match #" value={pre.match} onChange={e=>setPre({...pre, match:e.target.value})}/>
                    <select className="inp" value={pre.bat} onChange={e=>setPre({...pre, bat:e.target.value})}>
                      <option value="">-- Select Battery --</option>
                      {sortedBats.map(b => <option key={b.id} value={b.id}>{b.id}</option>)}
                    </select>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10}}>
                      <input className="inp" placeholder="V" type="number" step="0.01" value={pre.v} onChange={e=>setPre({...pre, v:e.target.value})}/>
                      <input className="inp" placeholder="%" type="number" value={pre.pct} onChange={e=>setPre({...pre, pct:e.target.value})}/>
                      <input className="inp" placeholder="IR" type="number" step="0.1" value={pre.ir} onChange={e=>setPre({...pre, ir:e.target.value})}/>
                    </div>
                    <button className="btn-p" onClick={savePre}>Log Pre-Match</button>
                  </div></div>
                )}
                {tab === "post" && (
                  <div>
                    {eventRecords.filter(r => !r.post).map(r => (
                      <div key={r.id} className="card">
                        <div className="ch"><div className="ct">Post: {r.bat} (M{r.match})</div></div>
                        <div className="cb">
                          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:10}}>
                            <input id={`v-${r.id}`} className="inp" placeholder="V" type="number" step="0.01" />
                            <input id={`p-${r.id}`} className="inp" placeholder="%" type="number" />
                            <input id={`i-${r.id}`} className="inp" placeholder="IR" type="number" step="0.1" />
                          </div>
                          <button className="btn-p" onClick={() => {
                            const v = document.getElementById(`v-${r.id}`).value;
                            const pct = document.getElementById(`p-${r.id}`).value;
                            const ir = document.getElementById(`i-${r.id}`).value;
                            db.collection("records").doc(r.id).update({ post: {v, pct, ir} });
                          }}>Submit</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {tab === "history" && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    {eventRecords.sort((a, b) => b.timestamp - a.timestamp).map(r => {
                      // Logic for calculating the drops/rises
                      const vDiff = r.post ? (parseFloat(r.pre.v) - parseFloat(r.post.v)).toFixed(1) : null;
                      const pctDiff = r.post ? (parseInt(r.pre.pct) - parseInt(r.post.pct)) : null;
                      const irDiff = r.post ? Math.round((parseFloat(r.post.ir) - parseFloat(r.pre.ir)) * 10) / 10 : null;

                      return (
                        <div key={r.id} className="card" style={{ padding: 12 }}>
                          {/* Header Row */}
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
                            <div>
                              <div style={{ fontSize: 18, fontWeight: 900, color: 'var(--text)', letterSpacing: '0.5px', textTransform: 'uppercase' }}>
                                {r.bat}
                              </div>
                              <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 2, opacity: 0.8 }}>
                                {new Date(r.timestamp).toLocaleString()}
                              </div>
                            </div>
                            <div style={{ 
                              border: '1px solid var(--yellow)', 
                              padding: '2px 10px', 
                              borderRadius: 4, 
                              color: 'var(--yellow)', 
                              fontSize: 11, 
                              fontWeight: 800,
                              letterSpacing: '0.5px'
                            }}>
                              MATCH {r.match}
                            </div>
                          </div>

                          {/* Stats Grid */}
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                            
                            {/* VOLTAGE BOX */}
                            <div style={{ background: 'rgba(255,255,255,0.03)', padding: '8px 10px', borderRadius: 4, border: '1px solid rgba(255,255,255,0.05)' }}>
                              <div style={{ fontSize: 9, color: 'var(--muted)', fontWeight: 700, marginBottom: 4 }}>VOLTAGE</div>
                              <div style={{ fontSize: 15, fontWeight: 800, fontFamily: 'var(--mono)' }}>
                                {r.pre.v}<span style={{ color: 'var(--muted)', margin: '0 2px', fontWeight: 400 }}>→</span>{r.post?.v || '--'}
                              </div>
                              {vDiff && (
                                <div style={{ fontSize: 11, color: 'var(--red)', marginTop: 2, fontWeight: 700 }}>
                                  ▼ {vDiff}
                                </div>
                              )}
                            </div>

                            {/* CHARGE BOX */}
                            <div style={{ background: 'rgba(255,255,255,0.03)', padding: '8px 10px', borderRadius: 4, border: '1px solid rgba(255,255,255,0.05)' }}>
                              <div style={{ fontSize: 9, color: 'var(--muted)', fontWeight: 700, marginBottom: 4 }}>CHARGE %</div>
                              <div style={{ fontSize: 15, fontWeight: 800, fontFamily: 'var(--mono)' }}>
                                {r.pre.pct}<span style={{ color: 'var(--muted)', margin: '0 2px', fontWeight: 400 }}>→</span>{r.post?.pct || '--'}
                              </div>
                              {pctDiff !== null && (
                                <div style={{ fontSize: 11, color: 'var(--red)', marginTop: 2, fontWeight: 700 }}>
                                  ▼ {pctDiff}
                                </div>
                              )}
                            </div>

                            {/* IR BOX */}
                            <div style={{ background: 'rgba(255,255,255,0.03)', padding: '8px 10px', borderRadius: 4, border: '1px solid rgba(255,255,255,0.05)' }}>
                              <div style={{ fontSize: 9, color: 'var(--muted)', fontWeight: 700, marginBottom: 4 }}>INT RES</div>
                              <div style={{ fontSize: 15, fontWeight: 800, fontFamily: 'var(--mono)' }}>
                                {r.pre.ir}<span style={{ color: 'var(--muted)', margin: '0 2px', fontWeight: 400 }}>→</span>{r.post?.ir || '--'}
                              </div>
                              {irDiff !== null && (
                                <div style={{ fontSize: 11, color: irDiff >= 0 ? 'var(--red)' : 'var(--green)', marginTop: 2, fontWeight: 700 }}>
                                  {irDiff >= 0 ? `▲ ${irDiff}` : `▼ ${Math.abs(irDiff)}`}
                                </div>
                              )}
                            </div>

                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {tab === "stats" && <StatsView batteries={sortedBats} records={eventRecords} />}
              </div>
            </div>
          )}
        </div>
      );
    };

    const StatsView = ({ batteries, records }) => {
      const [activeSubTab, setActiveSubTab] = React.useState("ir");
      const [deepDiveTab, setDeepDiveTab] = React.useState("ir_trend");
      const [selectedBat, setSelectedBat] = React.useState("");
      const [hoveredIndex, setHoveredIndex] = React.useState(null);

      const valid = records.filter(r => r.post);

      const avg = (arr, path) => {
        if(!arr.length) return 0;
        return arr.reduce((s, r) => s + parseFloat(r.post[path] || 0), 0) / arr.length;
      };

      const fleetAvgV = avg(valid, 'v');
      const fleetAvgIR = avg(valid, 'ir');
      const fleetAvgDrop = valid.reduce((s, r) => s + (parseFloat(r.pre.v) - parseFloat(r.post.v)), 0) / (valid.length || 1);
      const fleetAvgCharge = valid.reduce((s, r) => s + (parseFloat(r.pre.pct) - parseFloat(r.post.pct)), 0) / (valid.length || 1);

      const comparisonData = batteries.map(b => {
        const bRecs = valid.filter(r => r.bat === b.id);
        if (!bRecs.length) return null;
        const sorted = [...bRecs].sort((a, b) => b.timestamp - a.timestamp);
        return {
          id: b.id,
          latestIR: parseFloat(sorted[0].post.ir),
          avgV: bRecs.reduce((s, r) => s + parseFloat(r.post.v), 0) / bRecs.length,
          avgDrop: bRecs.reduce((s, r) => s + (parseFloat(r.pre.v) - parseFloat(r.post.v)), 0) / bRecs.length,
          usage: bRecs.length,
          avgDrain: bRecs.reduce((s, r) => s + (parseFloat(r.pre.pct) - parseFloat(r.post.pct)), 0) / bRecs.length
        };
      }).filter(Boolean);

      const diveRecs = valid.filter(r => r.bat === selectedBat).sort((a, b) => parseInt(a.match) - parseInt(b.match));

      const getDeepDiveScales = () => {
        if (!selectedBat || diveRecs.length === 0) return null;
        if (deepDiveTab === 'ir_trend') {
          const maxVal = Math.max(...diveRecs.map(r => Math.max(parseFloat(r.pre.ir), parseFloat(r.post.ir))), 22);
          return { min: 0, max: Math.ceil(maxVal / 2) * 2, unit: 'mΩ' };
        }
        if (deepDiveTab === 'v_trend') {
          const maxVal = Math.max(...diveRecs.map(r => parseFloat(r.pre.v)), 13);
          return { min: 7.5, max: parseFloat(maxVal.toFixed(1)), unit: 'V' };
        }
        const maxDrop = Math.max(...diveRecs.map(r => (parseFloat(r.pre.v) - parseFloat(r.post.v))), 1);
        const maxDrain = Math.max(...diveRecs.map(r => (parseFloat(r.pre.pct) - parseFloat(r.post.pct))), 25);
        return { min: 0, maxV: Math.ceil(maxDrop * 10) / 10, maxPct: Math.ceil(maxDrain / 5) * 5 };
      };

      const ddScale = getDeepDiveScales();

      // New helper for consistent vertical positioning of threshold lines
      const getYPos = (val) => {
        if (!ddScale) return 0;
        return 100 - (((val - ddScale.min) / (ddScale.max - ddScale.min)) * 100);
      };

      const getStatusColor = (val, type) => {
        if (type === 'ir_trend') {
          if (val < 15) return 'var(--green)';
          if (val <= 20) return 'var(--yellow)';
          return 'var(--red)';
        }
        if (type === 'v_trend') {
          if (val > 12.5) return 'var(--green)';
          if (val >= 12) return 'var(--yellow)';
          return 'var(--red)';
        }
        if (type === 'drain_bar') {
          if (val < 0.5) return 'var(--green)';
          if (val <= 1.0) return 'var(--yellow)';
          return 'var(--red)';
        }
        return 'var(--blue)';
      };

      const getCompScale = () => {
        if (activeSubTab === 'ir') return { min: 0, max: 25, unit: "mΩ", steps: 5 };
        if (activeSubTab === 'post voltage') return { min: 10.5, max: 13, unit: "V", steps: 5 };
        if (activeSubTab === 'drain') return { min: 0, max: 50, unit: "%", steps: 5 };
        return { min: 0, max: 10, unit: "x", steps: 5 };
      };
      const compScale = getCompScale();
      const compTicks = Array.from({ length: compScale.steps + 1 }, (_, i) => compScale.min + (i * (compScale.max - compScale.min) / compScale.steps));

      const getX = (i, total) => 5 + (i / (total - 1 || 1)) * 88;

      const getSmoothPath = (recs, type, isSecondary = false) => {
        if (recs.length < 2) return "";
        const points = recs.map((r, i) => {
          const x = getX(i, recs.length);
          let val = 0;
          if (type === 'ir_trend') {
            const ir = isSecondary ? parseFloat(r.pre.ir) : parseFloat(r.post.ir);
            val = ((ir - ddScale.min) / (ddScale.max - ddScale.min)) * 100;
          } else if (type === 'v_trend') {
            const v = isSecondary ? parseFloat(r.pre.v) : parseFloat(r.post.v);
            val = ((v - ddScale.min) / (ddScale.max - ddScale.min)) * 100;
          } else if (type === 'drain_trend') {
            val = ((parseFloat(r.pre.pct) - parseFloat(r.post.pct)) / ddScale.maxPct) * 100;
          }
          return { x, y: 100 - val };
        });
        return points.reduce((acc, p, i, a) => {
          if (i === 0) return `M ${p.x},${p.y}`;
          const prev = a[i - 1];
          const cp1x = prev.x + (p.x - prev.x) / 2;
          return `${acc} C ${cp1x},${prev.y} ${cp1x},${p.y} ${p.x},${p.y}`;
        }, "");
      };

      return (
        <div style={{fontStretch: 'condensed'}}>
          {/* --- FLEET OVERVIEW --- */}
          <div className="ct" style={{marginBottom:10, fontSize:12, fontWeight: 600}}>Battery Overview</div>
          <div className="ov-grid" style={{gridTemplateColumns:'1fr 1fr'}}>
            <div className="ov-box" style={{borderLeftColor:'var(--yellow)'}}>
              <div className="ov-label">Complete Matches</div>
              <div className="ov-val" style={{color:'var(--yellow)'}}>{valid.length}</div>
              <div className="ov-sub">across {batteries.length} batteries</div>
            </div>
            <div className="ov-box" style={{borderLeftColor:'var(--green)'}}>
              <div className="ov-label">Avg Post-Match V</div>
              <div className="ov-val" style={{color:'var(--green)'}}>{fleetAvgV.toFixed(2)}V</div>
              <div className="ov-sub">global average</div>
            </div>
          </div>
          <div className="ov-grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
            <div className="ov-box"><div className="ov-label">Avg Drop</div><div className="ov-val" style={{fontSize:18, color:'#5A99FF'}}>{fleetAvgDrop.toFixed(2)}V</div></div>
            <div className="ov-box"><div className="ov-label">Avg Drain</div><div className="ov-val" style={{fontSize:18, color:'#5A99FF'}}>{fleetAvgCharge.toFixed(0)}%</div></div>
            <div className="ov-box"><div className="ov-label">Avg IR</div><div className="ov-val" style={{fontSize:18, color:'var(--yellow)'}}>{fleetAvgIR.toFixed(0)}mΩ</div></div>
          </div>

          {/* --- FLEET COMPARISON --- */}
          <div className="ct" style={{margin:'24px 0 10px', fontSize:12, fontWeight: 600}}>Battery Comparison</div>
          <div className="card"><div className="cb">
            <div className="comp-tabs">
              {['ir','post voltage','drain','match usage'].map(t => (
                <button key={t} className={`comp-tab ${activeSubTab===t?'on':''}`} onClick={()=>setActiveSubTab(t)}>{t.toUpperCase()}</button>
              ))}
            </div>
            <div className="graph-container">
              <div className="grid-lines">{compTicks.map((_, i) => <div key={i} className="grid-line" />)}</div>
              {comparisonData.sort((a,b) => activeSubTab==='ir' ? a.latestIR - b.latestIR : b.avgV - a.avgV).map(d => {
                const val = activeSubTab==='post voltage' ? d.avgV : (activeSubTab==='ir' ? d.latestIR : (activeSubTab==='match usage' ? d.usage : d.avgDrain));
                const w = activeSubTab==='post voltage' ? ((val-compScale.min)/(compScale.max-compScale.min))*100 : (val/compScale.max)*100;
                return (
                  <div key={d.id} className="chart-row">
                    <div className="chart-label" style={{fontWeight: 700}}>{d.id}</div>
                    <div className="chart-track">
                      <div className="chart-bar" style={{width:`${Math.min(100, Math.max(2, w))}%`, 
                        background: activeSubTab === 'ir' 
                          ? (val < 15 ? 'var(--green)' : val <= 20 ? 'var(--orange)' : 'var(--red)') 
                          : activeSubTab === 'post voltage' 
                            ? (val > 12.5 ? 'var(--green)' : val >= 12 ? 'var(--yellow)' : 'var(--red)') 
                            : 'var(--blue)'}}></div>
                    </div>
                    <div className="chart-val-label">{val.toFixed(1)}{compScale.unit}</div>
                  </div>
                );
              })}
              <div className="x-axis">{compTicks.map((t, i) => <div key={i} className="x-tick">{t}{compScale.unit}</div>)}</div>
            </div>
          </div></div>

          {/* --- BATTERY DEEP DIVE --- */}
          <div className="ct" style={{margin:'24px 0 10px', fontSize:12, fontWeight: 600}}>Battery Deep Dive</div>
          <div className="card"><div className="cb">
            <select className="inp" style={{fontWeight: 700}} value={selectedBat} onChange={e=>setSelectedBat(e.target.value)}>
              <option value="">Select Battery...</option>
              {batteries.map(b => <option key={b.id} value={b.id}>{b.id}</option>)}
            </select>
            
            {selectedBat && diveRecs.length > 0 ? (
              <div style={{marginTop:15}}>
                <div className="comp-tabs">
                  <button className={`comp-tab ${deepDiveTab==='ir_trend'?'on':''}`} onClick={()=>setDeepDiveTab('ir_trend')}>⚡ IR</button>
                  <button className={`comp-tab ${deepDiveTab==='v_trend'?'on':''}`} onClick={()=>setDeepDiveTab('v_trend')}>🔋 VOLTS</button>
                  <button className={`comp-tab ${deepDiveTab==='drain_trend'?'on':''}`} onClick={()=>setDeepDiveTab('drain_trend')}>💧 DRAIN</button>
                </div>
                
                <div className="deep-dive-graph" style={{marginTop: 20, paddingBottom: 25}}>
                  {hoveredIndex !== null && (
                    <div className="popover" style={{left: `${getX(hoveredIndex, diveRecs.length)}%`, top: '-75px', transform: 'translateX(-50%)'}}>
                      <div className="pop-title" style={{fontWeight: 800}}>M{diveRecs[hoveredIndex].match}</div>
                      {deepDiveTab === 'ir_trend' ? <><div className="pop-row"><span>PRE IR:</span><span>{diveRecs[hoveredIndex].pre.ir}mΩ</span></div><div className="pop-row"><span>POST IR:</span><span>{diveRecs[hoveredIndex].post.ir}mΩ</span></div></>
                      : deepDiveTab === 'v_trend' ? <><div className="pop-row"><span>PRE V:</span><span>{diveRecs[hoveredIndex].pre.v}V</span></div><div className="pop-row"><span>POST V:</span><span>{diveRecs[hoveredIndex].post.v}V</span></div></>
                      : <><div className="pop-row"><span>V LOSS:</span><span>{(diveRecs[hoveredIndex].pre.v - diveRecs[hoveredIndex].post.v).toFixed(2)}V</span></div><div className="pop-row"><span>% USED:</span><span>{diveRecs[hoveredIndex].pre.pct - diveRecs[hoveredIndex].post.pct}%</span></div></>}
                    </div>
                  )}

                  <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style={{overflow:'visible'}}>
                    <defs>
                      <linearGradient id="lineGrad" x1="0" x2="0" y1="0" y2="1">
                        <stop offset="0%" stopColor={deepDiveTab === 'drain_trend' ? '#5A99FF' : 'var(--yellow)'} stopOpacity="0.1"/>
                        <stop offset="100%" stopColor="transparent" stopOpacity="0"/>
                      </linearGradient>
                    </defs>

                    {/* Grid Background */}
                    {[0, 12.5, 25, 37.5, 50, 62.5, 75, 87.5, 100].map(y => (
                      <g key={y}>
                        <line x1="5" y1={y} x2="93" y2={y} stroke="rgba(255,255,255,0.12)" strokeWidth="0.4" />
                        <text x="3.5" y={y} fontSize="3.5" fill="var(--muted)" textAnchor="end" dominantBaseline="middle" style={{fontFamily:'var(--disp)', fontWeight: 600, fontStretch: "ultra-condensed"}}>
                          {deepDiveTab === 'drain_trend' 
                            ? `${((1 - y/100) * ddScale.maxV).toFixed(1)}V` 
                            : `${((1 - y/100) * (ddScale.max - ddScale.min) + ddScale.min).toFixed(1)}${ddScale.unit}`}
                        </text>
                      </g>
                    ))}

                    {/* --- THRESHOLD LINES (IR & VOLTAGE) --- */}
                    {deepDiveTab === 'ir_trend' && (
                      <>
                        <line x1="5" y1={getYPos(15)} x2="93" y2={getYPos(15)} stroke="var(--yellow)" strokeWidth="0.6" strokeDasharray="1.5,1.5" opacity="0.8" />
                        <text x="94" y={getYPos(15)} fontSize="3" fill="var(--yellow)" dominantBaseline="middle" style={{fontWeight:700}}>15</text>
                        
                        <line x1="5" y1={getYPos(20)} x2="93" y2={getYPos(20)} stroke="var(--red)" strokeWidth="0.6" strokeDasharray="1.5,1.5" opacity="0.8" />
                        <text x="94" y={getYPos(20)} fontSize="3" fill="var(--red)" dominantBaseline="middle" style={{fontWeight:700}}>20</text>
                      </>
                    )}

                    {deepDiveTab === 'v_trend' && (
                      <>
                        <line x1="5" y1={getYPos(12)} x2="93" y2={getYPos(12)} stroke="var(--red)" strokeWidth="0.6" strokeDasharray="1.5,1.5" opacity="0.8" />
                        <text x="94" y={getYPos(12)} fontSize="3" fill="var(--red)" dominantBaseline="middle" style={{fontWeight:700}}>12V</text>
                      </>
                    )}

                    {deepDiveTab === 'drain_trend' && [0, 25, 50, 75, 100].map(y => (
                      <text key={`r-${y}`} x="94.5" y={y} fontSize="3.5" fill="var(--muted)" textAnchor="start" dominantBaseline="middle" style={{fontFamily:'var(--disp)', fontWeight: 600, fontStretch: "ultra-condensed"}}>
                        {((1 - y/100) * ddScale.maxPct).toFixed(0)}%
                      </text>
                    ))}

                    {diveRecs.map((_, i) => {
                      const x = getX(i, diveRecs.length);
                      return <line key={`v-grid-${i}`} x1={x} y1="0" x2={x} y2="100" stroke="rgba(255,255,255,0.18)" strokeWidth="0.4" />;
                    })}
                    
                    {deepDiveTab === 'drain_trend' && diveRecs.map((r, i) => {
                      const x = getX(i, diveRecs.length);
                      const dropVal = parseFloat(r.pre.v) - parseFloat(r.post.v);
                      const dropH = (dropVal / ddScale.maxV) * 100;
                      const barColor = getStatusColor(dropVal, 'drain_bar');
                      return <rect key={i} x={x - 1} y={100 - dropH} width="2" height={dropH} fill={barColor} opacity={hoveredIndex === i ? "1" : "0.5"} rx="0.2" />;
                    })}

                    <path d={`${getSmoothPath(diveRecs, deepDiveTab)} L 93,100 L 5,100 Z`} fill="url(#lineGrad)" />
                    <path fill="none" stroke={deepDiveTab === 'drain_trend' ? '#5A99FF' : 'var(--yellow)'} strokeWidth="1.5" d={getSmoothPath(diveRecs, deepDiveTab)} />
                    
                    {(deepDiveTab === 'ir_trend' || deepDiveTab === 'v_trend') && (
                      <path fill="none" stroke="#5A99FF" strokeWidth="1.2" d={getSmoothPath(diveRecs, deepDiveTab, true)} />
                    )}

                    {diveRecs.map((r, i) => {
                      const x = getX(i, diveRecs.length);
                      const isTrend = deepDiveTab === 'ir_trend' || deepDiveTab === 'v_trend';
                      const yPost = 100 - (deepDiveTab === 'drain_trend' ? ((parseFloat(r.pre.pct) - parseFloat(r.post.pct)) / ddScale.maxPct) * 100 : ((parseFloat(r.post[deepDiveTab === 'ir_trend' ? 'ir' : 'v']) - ddScale.min) / (ddScale.max - ddScale.min)) * 100);
                      const postVal = parseFloat(r.post[deepDiveTab === 'ir_trend' ? 'ir' : 'v']);
                      const postDotColor = isTrend ? getStatusColor(postVal, deepDiveTab) : '#5A99FF';
                      return (
                        <g key={i}>
                          {isTrend && <ellipse cx={x} cy={100 - ((parseFloat(r.pre[deepDiveTab === 'ir_trend' ? 'ir' : 'v']) - ddScale.min) / (ddScale.max - ddScale.min)) * 100} rx="1" ry="2" fill="#5A99FF" />}
                          <ellipse cx={x} cy={yPost} rx="1.2" ry="2.5" fill={postDotColor} stroke={hoveredIndex === i ? "white" : "none"} strokeWidth="0.5" />
                        </g>
                      );
                    })}

                    {diveRecs.map((_, i) => {
                        const width = 88 / (diveRecs.length - 1 || 1);
                        const x = getX(i, diveRecs.length);
                        return <rect key={`hit-${i}`} x={x - width/2} y="0" width={width} height="100%" fill="transparent" style={{cursor:'pointer'}} onMouseEnter={() => setHoveredIndex(i)} onMouseLeave={() => setHoveredIndex(null)} />;
                    })}
                  </svg>

                  {/* Labels Container */}
                  <div style={{ position:'absolute', bottom: 5, left: '15%', width: '76.5%', height: 12, pointerEvents: 'none' }}>
                    {diveRecs.map((r, i) => {
                      const leftPos = (i / (diveRecs.length - 1 || 1)) * 100;
                      return (
                        <div key={i} style={{ position: 'absolute', left: `${leftPos}%`, transform: 'translateX(-50%)' }}>
                          <span style={{ fontSize:9, color:hoveredIndex === i ? 'var(--yellow)' : 'var(--muted)', fontWeight: 700, fontFamily:'var(--disp)' }}>
                            M{r.match}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            ) : <div style={{padding:40, textAlign:'center', color:'var(--muted)', fontSize:12}}>Insufficient data.</div>}
          </div></div>

          {/* --- HEALTH RANKING --- */}
          <div className="ct" style={{margin:'24px 0 10px', fontSize:12, fontWeight: 600}}>Health Ranking (by IR)</div>
          <div className="card"><div className="cb" style={{paddingTop:8}}>
            {comparisonData.sort((a,b)=>a.latestIR-b.latestIR).map((d, i) => (
              <div key={d.id} className="rank-row">
                <div className="rank-id" style={{color: i===0?'var(--green)':'var(--text)', fontWeight: 700}}>{i+1}. {d.id} {i===0 && '🏆'}</div>
                <div className="rank-stat" style={{color: d.latestIR<15?'var(--green)': d.latestIR>20?'var(--red)':'var(--orange)', fontWeight: 600}}>{d.latestIR.toFixed(1)} mΩ</div>
              </div>
            ))}
          </div></div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
