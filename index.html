<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Under Control · FRC Team 1156 · Battery Viewer [READ ONLY]</title>
  <meta name="theme-color" content="#1B3A8C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Under Control Battery View" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blue:#1B3A8C;--blue-dark:#122870;--blue-light:#2E55CC;
      --yellow:#F5C800;--green:#39FF14;
      --bg:#0A0E1A;--surface:#0F1526;--surface2:#161E35;
      --border:#1E2D5A;--text:#E8ECF8;--muted:#5A6A99;
      --mono:'Share Tech Mono',monospace;--disp:'Oswald',sans-serif;--body:'Barlow Condensed',sans-serif;
    }
    html,body{background:var(--bg);height:100%;-webkit-tap-highlight-color:transparent;}
    #root{height:100%;}
    .app{font-family:var(--body);background:var(--bg);min-height:100vh;max-width:430px;margin:0 auto;color:var(--text);}
    /* RO Banner */
    .ro-banner{background:linear-gradient(90deg,#3A1A00,#5A2A00,#3A1A00);border-bottom:2px solid #FF9933;padding:7px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:20;}
    .ro-text{font-family:var(--mono);font-size:10px;color:#FF9933;letter-spacing:1px;flex:1;}
    .ro-badge{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:2px;background:#FF9933;color:#000;padding:3px 8px;border-radius:2px;flex-shrink:0;}
    /* Header */
    .hdr{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 60%,var(--blue-light) 100%);border-bottom:3px solid var(--yellow);position:sticky;top:32px;z-index:10;box-shadow:0 2px 20px rgba(0,0,0,.5);}
    .hdr-inner{display:flex;align-items:center;gap:12px;padding:10px 14px;}
    .hdr-logo{width:52px;height:52px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}
    .hdr-text{flex:1;}
    .hdr-title{font-family:var(--disp);font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);line-height:1;}
    .hdr-team{font-family:var(--disp);font-size:13px;font-weight:400;color:#AAC0FF;letter-spacing:1px;margin-top:2px;}
    .hdr-tagline{font-family:var(--mono);font-size:8px;color:rgba(170,192,255,.7);letter-spacing:.5px;margin-top:3px;text-transform:uppercase;}
    .hdr-right{text-align:right;flex-shrink:0;}
    .hdr-stat{font-family:var(--mono);font-size:11px;color:var(--yellow);}
    .hdr-sync{font-family:var(--mono);font-size:9px;margin-top:4px;display:flex;align-items:center;gap:4px;justify-content:flex-end;}
    /* Tabs */
    .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:107px;z-index:9;}
    .tab{flex:1;padding:9px 2px;font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;text-align:center;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
    .tab.on{color:var(--yellow);border-bottom-color:var(--yellow);}
    /* Cards */
    .pg{padding:14px;padding-bottom:40px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden;}
    .ch{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);}
    .ct{font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);}
    .cb{padding:14px;}
    /* Data */
    .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
    .st{background:#070B16;padding:7px 9px;border:1px solid var(--border);border-radius:2px;}
    .sl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
    .sv{font-family:var(--mono);font-size:12px;color:var(--text);margin-top:2px;}
    .sd{font-family:var(--mono);font-size:10px;margin-top:1px;display:block;}
    .pos{color:#39FF14;}.neg{color:#FF5555;}
    .badge{font-family:var(--mono);font-size:10px;background:rgba(27,58,140,.4);color:var(--yellow);padding:3px 8px;border:1px solid rgba(245,200,0,.3);border-radius:2px;}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
    .dst{background:#070B16;padding:11px;border:1px solid var(--border);border-radius:2px;}
    /* Records */
    .rec{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
    .rec:last-child{border-bottom:none;}
    .rec:hover,.rec:active{background:var(--surface2);}
    .rec-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .rec-id{font-family:var(--disp);font-size:17px;font-weight:700;letter-spacing:1px;}
    /* Fleet */
    .bi{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
    .bi:last-child{border-bottom:none;}
    .bi:hover,.bi:active{background:var(--surface2);}
    .bid{font-family:var(--disp);font-size:18px;font-weight:700;letter-spacing:1px;}
    .bsub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;}
    .hbar-w{height:4px;background:#1A2040;width:80px;margin-top:5px;border-radius:2px;}
    .hbar{height:4px;border-radius:2px;}
    /* Misc */
    .empty{text-align:center;padding:40px 20px;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:1px;line-height:2.2;}
    .back{background:none;border:none;color:var(--yellow);cursor:pointer;font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1px;padding:0;}
    /* Sync */
    .sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
    .sync-live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
    .sync-off{background:#FF5555;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    /* Loading */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:var(--bg);}
    .loading img{width:90px;height:90px;object-fit:contain;animation:breathe 2s ease-in-out infinite;}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .loading-title{font-family:var(--disp);font-size:22px;font-weight:700;letter-spacing:4px;color:var(--yellow);}
    .loading-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Footer */
    .sponsor-strip{background:var(--blue-dark);border-top:1px solid rgba(245,200,0,.2);padding:8px 14px;display:flex;align-items:center;gap:8px;}
    .sponsor-strip-logo{width:22px;height:22px;object-fit:contain;opacity:.7;}
    .sponsor-strip-text{font-family:var(--mono);font-size:9px;color:rgba(170,192,255,.5);letter-spacing:1px;text-transform:uppercase;}
    /* Setup */
    .setup-step{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start;}
    .step-num{background:var(--yellow);color:#000;font-family:var(--disp);font-weight:700;font-size:13px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
    .step-text{font-family:var(--mono);font-size:12px;color:var(--text);line-height:1.7;}
    /* Stats */
    .stat-hero{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .stat-hero-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px 12px;display:flex;flex-direction:column;gap:4px;}
    .kpi-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
    .kpi-value{font-family:var(--disp);font-size:28px;font-weight:700;line-height:1;}
    .kpi-sub{font-family:var(--mono);font-size:9px;color:var(--muted);}
    .kpi-yellow{color:var(--yellow);}
    .kpi-blue{color:#5BA3FF;}
    .bar-row{padding:8px 14px;border-bottom:1px solid var(--border);}
    .bar-row:last-child{border-bottom:none;}
    .bar-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
    .bar-name{font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:1px;}
    .bar-val{font-family:var(--mono);font-size:11px;}
    .bar-track{height:6px;background:#1A2040;border-radius:3px;overflow:hidden;}
    .bar-fill{height:6px;border-radius:3px;}
    .bar-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px;}
    .rank-badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:2px;font-weight:700;}
    .rank-ok{background:rgba(57,255,20,.1);color:var(--green);border:1px solid rgba(57,255,20,.3);}
    .rank-1{background:rgba(245,200,0,.15);color:var(--yellow);border:1px solid rgba(245,200,0,.4);}
    .rank-warn{background:rgba(255,85,85,.15);color:#FF5555;border:1px solid rgba(255,85,85,.4);}
    .alert-banner{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
    .alert-banner:last-child{border-bottom:none;}
    .alert-icon{font-size:16px;flex-shrink:0;}
    .alert-text{font-family:var(--mono);font-size:10px;line-height:1.5;}
    .alert-bat{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--yellow);}
    /* Charts */
    .bat-selector{margin:0 14px 12px;display:flex;align-items:center;gap:8px;}
    .bat-selector label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
    .bat-selector select{flex:1;background:#070B16;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:7px 10px;border-radius:3px;outline:none;-webkit-appearance:none;appearance:none;}
    .bat-selector select:focus{border-color:var(--yellow);}
    .chart-tabs{display:flex;margin:0 14px 12px;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
    .chart-tab{flex:1;padding:7px 4px;font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;text-align:center;color:var(--muted);border:none;background:var(--surface2);cursor:pointer;transition:all .15s;border-right:1px solid var(--border);}
    .chart-tab:last-child{border-right:none;}
    .chart-tab.on{color:var(--yellow);background:#0A1030;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script>
    var LOGO_SRC = "under.png";
    var firebaseConfig = {
      apiKey: "AIzaSyBjCIvmVXYGse1HZH5P8qcLcSB8AaovUTg",
      authDomain: "battery-tracker-1156.firebaseapp.com",
      projectId: "battery-tracker-1156",
      storageBucket: "battery-tracker-1156.firebasestorage.app",
      messagingSenderId: "336037957747",
      appId: "1:336037957747:web:5799ba1767553be4deda06"
    };
    var CONFIG_FILLED = !firebaseConfig.apiKey.includes("PASTE");
    var db;
    if (CONFIG_FILLED) { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); }
    Chart.defaults.color='#5A6A99'; Chart.defaults.borderColor='#1E2D5A';
    Chart.defaults.font.family="'Share Tech Mono',monospace"; Chart.defaults.font.size=10;
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;
    const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
    const n2=v=>+v.toFixed(2); const n1=v=>+v.toFixed(1);
    function fmtTs(ts){if(!ts)return"";try{return new Date(ts.toDate?ts.toDate():ts).toLocaleString();}catch{return"";}}
    function fmtTsShort(ts){if(!ts)return"";try{return new Date(ts.toDate?ts.toDate():ts).toLocaleDateString();}catch{return"";}}
    function irColor(ir){return ir<15?"#39FF14":ir<20?"#F5C800":"#FF5555";}
    function voltColor(v){return v>12.4?"#39FF14":v>12.0?"#F5C800":"#FF5555";}

    function ChartCanvas({type,data,options,height=180}){
      const ref=useRef(null); const chartRef=useRef(null);
      useEffect(()=>{
        if(!ref.current)return;
        if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
        chartRef.current=new Chart(ref.current,{type,data,options});
        return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
      },[JSON.stringify(data)]);
      return(<div style={{position:"relative",height:height,background:"#070B16",borderRadius:3,border:"1px solid #1E2D5A",padding:"8px 6px 6px"}}><canvas ref={ref}/></div>);
    }

    function IRChart({recs}){
      const sorted=[...recs].reverse();
      const labels=sorted.map((_,i)=>"M"+(i+1));
      const preIR=sorted.map(r=>r.pre.ir); const postIR=sorted.map(r=>r.post.ir);
      const data={labels,datasets:[
        {label:"Post-Match IR",data:postIR,borderColor:"#F5C800",backgroundColor:"rgba(245,200,0,0.08)",pointBackgroundColor:postIR.map(v=>irColor(v)),pointRadius:5,pointHoverRadius:7,borderWidth:2,tension:0.3,fill:true},
        {label:"Pre-Match IR",data:preIR,borderColor:"#5BA3FF",backgroundColor:"transparent",pointBackgroundColor:"#5BA3FF",pointRadius:3,borderWidth:1.5,borderDash:[4,3],tension:0.3},
        ...(sorted.length?[{label:"Watch (15mΩ)",data:Array(sorted.length).fill(15),borderColor:"rgba(245,200,0,0.35)",borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false},{label:"Replace (20mΩ)",data:Array(sorted.length).fill(20),borderColor:"rgba(255,85,85,0.4)",borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false}]:[])
      ]};
      const options={responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y}mΩ`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9}}},y:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"mΩ"}}}};
      return(<div><ChartCanvas type="line" data={data} options={options} height={190}/><div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 2px 0",fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#F5C800",borderRadius:1,display:"inline-block"}}></span>Post-Match IR</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#5BA3FF",borderRadius:1,display:"inline-block",opacity:.6}}></span>Pre-Match IR</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"rgba(245,200,0,.4)",borderRadius:1,display:"inline-block"}}></span>15mΩ watch</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"rgba(255,85,85,.5)",borderRadius:1,display:"inline-block"}}></span>20mΩ replace</span></div></div>);
    }

    function VoltageChart({recs}){
      const sorted=[...recs].reverse();
      const labels=sorted.map((_,i)=>"M"+(i+1));
      const data={labels,datasets:[
        {label:"Pre-Match V",data:sorted.map(r=>r.pre.v),borderColor:"#5BA3FF",backgroundColor:"rgba(91,163,255,0.06)",pointBackgroundColor:"#5BA3FF",pointRadius:4,borderWidth:2,tension:0.3,fill:true},
        {label:"Post-Match V",data:sorted.map(r=>r.post.v),borderColor:"#F5C800",backgroundColor:"rgba(245,200,0,0.06)",pointBackgroundColor:sorted.map(r=>voltColor(r.post.v)),pointRadius:5,borderWidth:2,tension:0.3,fill:true},
        ...(sorted.length?[{label:"12.0V floor",data:Array(sorted.length).fill(12.0),borderColor:"rgba(255,85,85,0.4)",borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false}]:[])
      ]};
      const options={responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y}V`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9}}},y:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"V"},min:Math.max(0,Math.min(...sorted.map(r=>r.post.v))-0.3)}}};
      return(<div><ChartCanvas type="line" data={data} options={options} height={190}/><div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 2px 0",fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#5BA3FF",display:"inline-block",borderRadius:1}}></span>Pre-Match V</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#F5C800",display:"inline-block",borderRadius:1}}></span>Post-Match V</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"rgba(255,85,85,.5)",display:"inline-block",borderRadius:1}}></span>12.0V floor</span></div></div>);
    }

    function DrainChart({recs}){
      const sorted=[...recs].reverse();
      const labels=sorted.map((_,i)=>"M"+(i+1));
      const drainV=sorted.map(r=>n2(r.pre.v-r.post.v));
      const drainPct=sorted.map(r=>r.pre.pct-r.post.pct);
      const data={labels,datasets:[
        {label:"Voltage Drop (V)",data:drainV,backgroundColor:drainV.map(v=>v>0.6?"rgba(255,85,85,0.7)":v>0.4?"rgba(245,200,0,0.7)":"rgba(57,255,20,0.5)"),borderColor:drainV.map(v=>v>0.6?"#FF5555":v>0.4?"#F5C800":"#39FF14"),borderWidth:1,borderRadius:2,yAxisID:"yV"},
        {label:"Charge Used (%)",data:drainPct,type:"line",borderColor:"#AAC0FF",backgroundColor:"transparent",pointBackgroundColor:"#AAC0FF",pointRadius:4,borderWidth:1.5,tension:0.3,yAxisID:"yP"}
      ]};
      const options={responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>ctx.datasetIndex===0?` Volt drop: ${ctx.parsed.y}V`:` Charge used: ${ctx.parsed.y}%`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9}}},yV:{position:"left",grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"V"}},yP:{position:"right",grid:{drawOnChartArea:false},ticks:{color:"#AAC0FF",font:{size:9},callback:v=>v+"%"}}}};
      return(<div><ChartCanvas type="bar" data={data} options={options} height={190}/><div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 2px 0",fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,background:"rgba(57,255,20,0.7)",display:"inline-block",borderRadius:2}}></span>Volt drop (left)</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#AAC0FF",display:"inline-block",borderRadius:1}}></span>Charge % (right)</span></div></div>);
    }

    function FleetIRChart({batStats}){
      const sorted=[...batStats].sort((a,b)=>a.avgIR-b.avgIR);
      const data={labels:sorted.map(b=>b.name),datasets:[{label:"Avg Post-Match IR",data:sorted.map(b=>b.avgIR),backgroundColor:sorted.map(b=>irColor(b.avgIR)+"99"),borderColor:sorted.map(b=>irColor(b.avgIR)),borderWidth:1,borderRadius:3}]};
      const options={responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.parsed.x}mΩ`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"mΩ"}},y:{grid:{color:"#1A2040"},ticks:{color:"#E8ECF8",font:{size:10,weight:"600"}}}}};
      return <ChartCanvas type="bar" data={data} options={options} height={Math.max(120,sorted.length*36)}/>;
    }

    function FleetVoltageChart({batStats}){
      const sorted=[...batStats].sort((a,b)=>b.avgPostV-a.avgPostV);
      const data={labels:sorted.map(b=>b.name),datasets:[{label:"Avg Post-Match Voltage",data:sorted.map(b=>b.avgPostV),backgroundColor:sorted.map(b=>voltColor(b.avgPostV)+"99"),borderColor:sorted.map(b=>voltColor(b.avgPostV)),borderWidth:1,borderRadius:3}]};
      const options={responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.parsed.x}V`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"V"},min:Math.max(0,Math.min(...sorted.map(b=>b.avgPostV))-0.3)},y:{grid:{color:"#1A2040"},ticks:{color:"#E8ECF8",font:{size:10,weight:"600"}}}}};
      return <ChartCanvas type="bar" data={data} options={options} height={Math.max(120,sorted.length*36)}/>;
    }

    function StatsTab({batteries,records}){
      const [selBat,setSelBat]=useState("");
      const [batChartTab,setBatChartTab]=useState("ir");
      const [fleetChartTab,setFleetChartTab]=useState("ir");

      const batStats=useMemo(()=>{
        return batteries.map(bat=>{
          const recs=records.filter(r=>r.batteryId===bat.name);
          if(!recs.length) return {name:bat.name,matches:0};
          return{name:bat.name,matches:recs.length,avgPostV:n2(avg(recs.map(r=>r.post.v))),avgDrainV:n2(avg(recs.map(r=>r.pre.v-r.post.v))),avgDrainPct:n1(avg(recs.map(r=>r.pre.pct-r.post.pct))),avgIR:n1(avg(recs.map(r=>r.post.ir))),lastIR:recs[0].post.ir,irTrend:recs.slice(0,8).reverse().map(r=>r.post.ir),avgPreV:n2(avg(recs.map(r=>r.pre.v))),recs};
        }).filter(b=>b.matches>0).sort((a,b)=>a.avgIR-b.avgIR);
      },[batteries,records]);

      const fleetStats=useMemo(()=>{
        if(!records.length) return null;
        return{avgDrainV:n2(avg(records.map(r=>r.pre.v-r.post.v))),avgDrainPct:n1(avg(records.map(r=>r.pre.pct-r.post.pct))),avgPostV:n2(avg(records.map(r=>r.post.v))),avgPostIR:n1(avg(records.map(r=>r.post.ir)))};
      },[records]);

      const alerts=useMemo(()=>{
        const out=[];
        batStats.forEach(b=>{
          if(b.irTrend&&b.irTrend.length>=3){const l=b.irTrend.slice(-3);if(l[2]>l[1]&&l[1]>l[0])out.push({type:'ir',bat:b.name,val:b.lastIR});}
          if(b.avgPostV!==null&&b.avgPostV<12.0)out.push({type:'volt',bat:b.name,val:b.avgPostV});
        });
        return out;
      },[batStats]);

      const selBatRecs=useMemo(()=>selBat?records.filter(r=>r.batteryId===selBat):[],[selBat,records]);
      useEffect(()=>{if(!selBat&&batStats.length)setSelBat(batStats[0].name);},[batStats]);

      if(!records.length) return <div className="empty" style={{paddingTop:60}}>📊<br/>No match data yet.</div>;

      return(
        <div>
          {alerts.length>0&&(<div className="card" style={{borderColor:"#FF5555"}}><div className="ch" style={{borderColor:"#FF5555"}}><span className="ct" style={{color:"#FF5555"}}>⚠ Alerts ({alerts.length})</span></div>{alerts.map((a,i)=>(<div key={i} className="alert-banner"><div className="alert-icon">{a.type==='ir'?'🔴':'⚡'}</div><div className="alert-text"><div className="alert-bat">{a.bat}</div>{a.type==='ir'?`IR rising 3 matches in a row (${a.val}mΩ)`:`Avg post-match voltage low (${a.val}V)`}</div></div>))}</div>)}

          <div className="card">
            <div className="ch"><span className="ct">Fleet Overview</span></div>
            <div className="cb" style={{paddingBottom:8}}>
              <div className="stat-hero">
                <div className="kpi"><div className="kpi-label">Total Matches</div><div className="kpi-value kpi-yellow">{records.length}</div><div className="kpi-sub">{batteries.length} batteries</div></div>
                <div className="kpi"><div className="kpi-label">Avg Post-Match V</div><div className="kpi-value" style={{color:voltColor(fleetStats.avgPostV)}}>{fleetStats.avgPostV}V</div><div className="kpi-sub">across all matches</div></div>
              </div>
              <div className="stat-hero-3">
                <div className="kpi"><div className="kpi-label">Avg Volt Drop</div><div className="kpi-value kpi-blue">{fleetStats.avgDrainV}V</div><div className="kpi-sub">per match</div></div>
                <div className="kpi"><div className="kpi-label">Avg Charge</div><div className="kpi-value kpi-blue">{fleetStats.avgDrainPct}%</div><div className="kpi-sub">used / match</div></div>
                <div className="kpi"><div className="kpi-label">Avg IR</div><div className="kpi-value" style={{color:irColor(fleetStats.avgPostIR),fontSize:22}}>{fleetStats.avgPostIR}mΩ</div><div className="kpi-sub">post-match</div></div>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="ch"><span className="ct">Fleet Comparison</span></div>
            <div className="chart-tabs">
              {[["ir","⚡ Int Resistance"],["volt","🔋 Post Voltage"],["usage","📊 Match Usage"]].map(([k,lbl])=>(
                <button key={k} className={"chart-tab"+(fleetChartTab===k?" on":"")} onClick={()=>setFleetChartTab(k)}>{lbl}</button>
              ))}
            </div>
            <div style={{padding:"0 14px 14px"}}>
              {fleetChartTab==="ir"&&<div><FleetIRChart batStats={batStats}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>Sorted best→worst. Below 15mΩ = healthy. Above 20mΩ = consider replacing.</div></div>}
              {fleetChartTab==="volt"&&<div><FleetVoltageChart batStats={batStats}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>Average post-match voltage. Below 12.0V consistently = tired battery.</div></div>}
              {fleetChartTab==="usage"&&<div><ChartCanvas type="bar" height={Math.max(120,batStats.length*36)} data={{labels:[...batStats].sort((a,b)=>b.matches-a.matches).map(b=>b.name),datasets:[{label:"Matches",data:[...batStats].sort((a,b)=>b.matches-a.matches).map(b=>b.matches),backgroundColor:"rgba(46,85,204,0.7)",borderColor:"#2E55CC",borderWidth:1,borderRadius:3}]}} options={{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.parsed.x} matches`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9}}},y:{grid:{color:"#1A2040"},ticks:{color:"#E8ECF8",font:{size:10,weight:"600"}}}}}}/></div>}
            </div>
          </div>

          <div className="card">
            <div className="ch"><span className="ct">Battery Deep Dive</span><span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}>time series</span></div>
            <div className="bat-selector"><label>Battery</label>
              <select value={selBat} onChange={e=>setSelBat(e.target.value)}>
                {batStats.map(b=><option key={b.name} value={b.name}>{b.name} ({b.matches} matches)</option>)}
              </select>
            </div>
            {selBat&&selBatRecs.length>=2?(
              <div>
                {(()=>{const b=batStats.find(x=>x.name===selBat);if(!b)return null;return(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,padding:"0 14px 12px"}}><div className="st" style={{padding:10}}><div className="sl">Avg IR</div><div style={{fontFamily:"var(--mono)",fontSize:16,color:irColor(b.avgIR),marginTop:3}}>{b.avgIR}mΩ</div></div><div className="st" style={{padding:10}}><div className="sl">Avg Post V</div><div style={{fontFamily:"var(--mono)",fontSize:16,color:voltColor(b.avgPostV),marginTop:3}}>{b.avgPostV}V</div></div><div className="st" style={{padding:10}}><div className="sl">Avg Drain</div><div style={{fontFamily:"var(--mono)",fontSize:16,color:"#5BA3FF",marginTop:3}}>{b.avgDrainPct}%</div></div></div>);})()}
                <div className="chart-tabs">
                  {[["ir","⚡ IR Health"],["volt","🔋 Voltage"],["drain","📉 Drain"]].map(([k,lbl])=>(
                    <button key={k} className={"chart-tab"+(batChartTab===k?" on":"")} onClick={()=>setBatChartTab(k)}>{lbl}</button>
                  ))}
                </div>
                <div style={{padding:"0 14px 14px"}}>
                  {batChartTab==="ir"&&<div><IRChart recs={selBatRecs}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>Rising post-match IR over time is the clearest signal of battery aging.</div></div>}
                  {batChartTab==="volt"&&<div><VoltageChart recs={selBatRecs}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>Consistent low post-match voltage indicates degraded capacity.</div></div>}
                  {batChartTab==="drain"&&<div><DrainChart recs={selBatRecs}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>High drain may indicate heavy robot usage or a weaker battery.</div></div>}
                </div>
              </div>
            ):(
              <div className="empty" style={{padding:"20px 14px"}}>{selBatRecs.length<2?"Need at least 2 logged matches to show charts.":"Select a battery above."}</div>
            )}
          </div>

          <div className="card">
            <div className="ch"><span className="ct">Health Ranking</span><span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}>sorted by avg IR</span></div>
            {batStats.map((b,i)=>{
              function irLbl(ir){if(!ir)return null;if(ir<15)return<span className="rank-badge rank-ok">GOOD</span>;if(ir<20)return<span className="rank-badge rank-1">WATCH</span>;return<span className="rank-badge rank-warn">REPLACE</span>;}
              const maxIR=Math.max(...batStats.map(x=>x.avgIR||0),1);
              return(<div key={b.name} className="bar-row"><div className="bar-meta"><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",width:16}}>{i+1}.</span><span className="bar-name">{b.name}</span>{irLbl(b.avgIR)}</div><span className="bar-val" style={{color:irColor(b.avgIR)}}>{b.avgIR}mΩ</span></div><div className="bar-track"><div className="bar-fill" style={{width:(b.avgIR/maxIR*100)+"%",background:irColor(b.avgIR)}}/></div><div className="bar-sub">{b.matches} matches · avg post {b.avgPostV}V · drain {b.avgDrainPct}%</div></div>);
            })}
          </div>
        </div>
      );
    }

    function Delta({a,b}){const d=+(b-a).toFixed(3);if(d>0)return<span className="sd pos">▲{Math.abs(d)}</span>;if(d<0)return<span className="sd neg">▼{Math.abs(d)}</span>;return<span className="sd" style={{color:"#2A3560"}}>—</span>;}

    function ROBanner(){return(<div className="ro-banner"><span style={{fontSize:14}}>🔒</span><span className="ro-text">View-only — data is live but no changes can be made</span><span className="ro-badge">READ ONLY</span></div>);}

    function Header({matchCount,online,onBack,backLabel,title}){
      return(<div className="hdr"><div className="hdr-inner"><img src={LOGO_SRC} className="hdr-logo" alt="Under Control."/><div className="hdr-text">{onBack?(<div><button className="back" onClick={onBack}>‹ {backLabel||"Back"}</button><div className="hdr-title" style={{fontSize:15,marginTop:2}}>{title}</div></div>):(<div><div className="hdr-title">⚡ Battery Tracker</div><div className="hdr-team">Under Control. · FRC Team 1156</div><div className="hdr-tagline">Inspiring STEM Leaders Through Robotics</div></div>)}</div><div className="hdr-right"><div className="hdr-stat">{matchCount} MATCHES</div><div className="hdr-sync"><span className={"sync-dot "+(online?"sync-live":"sync-off")}></span><span style={{fontFamily:"var(--mono)",fontSize:9,color:online?"var(--green)":"#FF5555"}}>{online?"LIVE":"OFFLINE"}</span></div></div></div></div>);
    }

    function RecordDetail({record,onBack}){
      const r=record;
      return(<div className="app"><ROBanner/><Header onBack={onBack} backLabel="Back" title={"Match "+r.match+" — "+r.batteryId} matchCount={0} online={true}/><div className="pg"><div className="card"><div className="ch"><span className="ct">{r.batteryId}</span><span className="badge">MATCH {r.match}</span></div><div className="cb"><div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",marginBottom:14}}>{fmtTs(r.ts)}</div><div className="detail-grid"><div className="dst"><div className="sl">Pre Voltage</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"#5BA3FF",marginTop:4}}>{r.pre.v} V</div></div><div className="dst"><div className="sl">Post Voltage</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"var(--yellow)",marginTop:4}}>{r.post.v} V</div></div><div className="dst"><div className="sl">Pre Charge</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"#5BA3FF",marginTop:4}}>{r.pre.pct} %</div></div><div className="dst"><div className="sl">Post Charge</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"var(--yellow)",marginTop:4}}>{r.post.pct} %</div></div><div className="dst"><div className="sl">Pre Int Res</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"#5BA3FF",marginTop:4}}>{r.pre.ir} mΩ</div></div><div className="dst"><div className="sl">Post Int Res</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"var(--yellow)",marginTop:4}}>{r.post.ir} mΩ</div></div></div><div style={{background:"#070B16",border:"1px solid var(--border)",padding:12,borderRadius:3}}><div className="sl" style={{marginBottom:10,color:"var(--yellow)"}}>Delta (Post − Pre)</div><div className="sg"><div className="st"><div className="sl">Voltage</div><Delta a={r.pre.v} b={r.post.v}/></div><div className="st"><div className="sl">Charge %</div><Delta a={r.pre.pct} b={r.post.pct}/></div><div className="st"><div className="sl">Int Res</div><Delta a={r.pre.ir} b={r.post.ir}/></div></div></div></div></div></div></div>);
    }

    function BatteryDetail({bid,records,onBack,onSelectRecord}){
      const br=records.filter(r=>r.batteryId===bid);
      const avgV=br.length?n2(avg(br.map(r=>r.post.v))):null;
      const avgIR=br.length?n1(avg(br.map(r=>r.post.ir))):null;
      return(<div className="app"><ROBanner/><Header onBack={onBack} backLabel="Fleet" title={bid} matchCount={0} online={true}/><div className="pg"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}><div className="st" style={{padding:12}}><div className="sl">Matches</div><div style={{fontFamily:"var(--mono)",fontSize:26,color:"var(--yellow)"}}>{br.length}</div></div><div className="st" style={{padding:12}}><div className="sl">Avg Post V</div><div style={{fontFamily:"var(--mono)",fontSize:18,marginTop:4}}>{avgV?avgV+"V":"—"}</div></div><div className="st" style={{padding:12}}><div className="sl">Avg IR</div><div style={{fontFamily:"var(--mono)",fontSize:18,marginTop:4}}>{avgIR?avgIR+"mΩ":"—"}</div></div></div><div className="card"><div className="ch"><span className="ct">Match History</span></div>{br.length===0&&<div className="empty">No matches logged yet</div>}{br.map(r=>(<div key={r.id} className="rec" onClick={()=>onSelectRecord(r)}><div className="rec-top"><span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)"}}>{fmtTsShort(r.ts)}</span><span className="badge">MATCH {r.match}</span></div><div className="sg"><div className="st"><div className="sl">Voltage</div><div className="sv">{r.pre.v}→{r.post.v}</div><Delta a={r.pre.v} b={r.post.v}/></div><div className="st"><div className="sl">Charge %</div><div className="sv">{r.pre.pct}→{r.post.pct}</div><Delta a={r.pre.pct} b={r.post.pct}/></div><div className="st"><div className="sl">Int Res</div><div className="sv">{r.pre.ir}→{r.post.ir}</div><Delta a={r.pre.ir} b={r.post.ir}/></div></div></div>))}</div></div></div>);
    }

    function SetupScreen(){
      return(<div className="app"><ROBanner/><div className="hdr"><div className="hdr-inner"><img src={LOGO_SRC} className="hdr-logo" alt="Under Control."/><div className="hdr-text"><div className="hdr-title">Setup Required</div><div className="hdr-team">Under Control. · FRC Team 1156</div></div></div></div><div className="pg"><div className="card" style={{borderColor:"var(--yellow)"}}><div className="ch"><span className="ct">Connect to Firebase</span></div><div className="cb">{[["Copy the 6 firebaseConfig values from the main app's index.html.","1"],["Paste them into this file (index-readonly.html) where it says PASTE_..._HERE.","2"],["Deploy to a second Netlify site (e.g. frcbattery-view.netlify.app).","3"],["Share the URL — viewers see live data but cannot make any changes.","4"]].map(([t,n])=>(<div key={n} className="setup-step"><div className="step-num">{n}</div><div className="step-text">{t}</div></div>))}</div></div></div></div>);
    }

    function App(){
      const [tab,setTab]=useState("fleet");
      const [batteries,setBats]=useState([]);
      const [records,setRecs]=useState([]);
      const [loading,setLoading]=useState(true);
      const [online,setOnline]=useState(true);
      const [view,setView]=useState(null);

      useEffect(()=>{
const u1 = db.collection("batteries").onSnapshot(s => {
  setBats(s.docs.map(d => ({
    id: d.id,
    name: d.data().name || d.id,
    ...d.data()
  })));
  setOnline(true);
  setLoading(false);
}, err => {
  console.error("Erro ao carregar batteries:", err);
  setOnline(false);
  setLoading(false);
});

const toNum = (v, fallback = 0) => {
  if (v === null || v === undefined || v === "") return fallback;
  const n = Number(String(v).replace(",", "."));
  return Number.isFinite(n) ? n : fallback;
};

const normalizeRecord = (doc) => {
  const r = { id: doc.id, ...doc.data() };

  return {
    ...r,

    // compatibilidade com o primeiro app
    batteryId: r.batteryId || r.bat,
    ts: r.ts || r.timestamp,

    match: toNum(r.match, r.match),

    pre: {
      v: toNum(r.pre?.v),
      pct: toNum(r.pre?.pct),
      ir: toNum(r.pre?.ir)
    },

    post: r.post ? {
      v: toNum(r.post?.v),
      pct: toNum(r.post?.pct),
      ir: toNum(r.post?.ir)
    } : null
  };
};

const u2 = db.collection("records").onSnapshot(s => {
  const data = s.docs
    .map(normalizeRecord)
    .filter(r => r.post); // só mostra registros completos

  data.sort((a, b) => (b.ts || 0) - (a.ts || 0));

  setRecs(data);
  setOnline(true);
}, err => {
  console.error("Erro ao carregar records:", err);
  setOnline(false);
});
      },[]);

      function getBatRecs(n){return records.filter(r=>r.batteryId===n);}
      function getLastRec(n){return getBatRecs(n)[0];}
      function hColor(pct){return pct>60?"#39FF14":pct>30?"#F5C800":"#FF5555";}

      if(loading)return(<div className="app"><div className="loading"><img src={LOGO_SRC} alt="Under Control"/><div className="loading-title">Under Control</div><div className="spinner"/><div className="loading-sub">Loading live data...</div></div></div>);
      if(view&&view.type==="rec")return<RecordDetail record={view.data} onBack={()=>setView(view.from?{type:"bat",name:view.from.name}:null)}/>;
      if(view&&view.type==="bat")return<BatteryDetail bid={view.name} records={records} onBack={()=>setView(null)} onSelectRecord={r=>setView({type:"rec",data:r,from:{name:view.name}})}/>;

      return(<div><div className="app"><ROBanner/><Header matchCount={records.length} online={online}/>
        <div className="tabs">{[["fleet","🔋 Fleet"],["history","📊 History"],["stats","📈 Stats"]].map(p=>(<button key={p[0]} className={"tab"+(tab===p[0]?" on":"")} onClick={()=>setTab(p[0])}>{p[1]}</button>))}</div>
        <div className="pg">
          {tab==="fleet"&&(<div>
            <div style={{background:"rgba(10,14,26,.92)",border:"1px solid #3A2A00",borderRadius:4,padding:20,marginBottom:12,display:"flex",flexDirection:"column",alignItems:"center",gap:8,textAlign:"center"}}>
              <div style={{fontSize:30}}>🔒</div>
              <div style={{fontFamily:"var(--disp)",fontSize:16,fontWeight:700,letterSpacing:2,color:"#FF9933"}}>View Only</div>
              <div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)",lineHeight:1.8}}>Live read-only view of the Under Control battery database. Data updates in real time as the team logs matches.</div>
            </div>
            <div className="card"><div className="ch"><span className="ct">Fleet ({batteries.length})</span></div>
              {batteries.length===0&&<div className="empty">🔋<br/>No batteries registered yet.</div>}
              {batteries.map(bat=>{const lr=getLastRec(bat.name);const pct=lr?lr.post.pct:0;const cnt=getBatRecs(bat.name).length;return(<div key={bat.id} className="bi" onClick={()=>setView({type:"bat",name:bat.name})}><div style={{flex:1}}><div className="bid">{bat.name}</div><div className="bsub">{cnt} match{cnt!==1?"es":""}{lr?" · Last: "+lr.post.v+"V · "+lr.post.pct+"%":""}</div><div className="hbar-w"><div className="hbar" style={{width:pct+"%",background:hColor(pct)}}/></div></div><span style={{color:"var(--muted)",fontSize:22}}>›</span></div>);})}
            </div>
          </div>)}
          {tab==="history"&&(<div className="card"><div className="ch"><span className="ct">All Matches ({records.length})</span></div>
            {records.length===0&&<div className="empty">📋<br/>No matches logged yet.</div>}
            {records.map(r=>(<div key={r.id} className="rec" onClick={()=>setView({type:"rec",data:r})}><div className="rec-top"><span className="rec-id" style={{fontFamily:"var(--disp)",fontSize:17,fontWeight:700}}>{r.batteryId}</span><span className="badge">MATCH {r.match}</span></div><div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",marginBottom:6}}>{fmtTs(r.ts)}</div><div className="sg"><div className="st"><div className="sl">Voltage</div><div className="sv">{r.pre.v}→{r.post.v}</div><Delta a={r.pre.v} b={r.post.v}/></div><div className="st"><div className="sl">Charge %</div><div className="sv">{r.pre.pct}→{r.post.pct}</div><Delta a={r.pre.pct} b={r.post.pct}/></div><div className="st"><div className="sl">Int Res</div><div className="sv">{r.pre.ir}→{r.post.ir}</div><Delta a={r.pre.ir} b={r.post.ir}/></div></div></div>))}
          </div>)}
          {tab==="stats"&&<StatsTab batteries={batteries} records={records}/>}
        </div>
        <div className="sponsor-strip"><img src={LOGO_SRC} className="sponsor-strip-logo" alt=""/><div className="sponsor-strip-text">Under Control. · FRC Team 1156 · Inspiring STEM Leaders Through Robotics</div></div>
      </div></div>);
    }

    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(CONFIG_FILLED?<App/>:<SetupScreen/>);
  </script>
</body>
</html>
