<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CHARGERS · FRC Team 5409 · Battery Tracker</title>
  <meta name="theme-color" content="#1B3A8C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CHARGERS Batteries" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blue:#1B3A8C;--blue-dark:#122870;--blue-light:#2E55CC;
      --red:#C41E1E;--red-dark:#8B1010;
      --yellow:#F5C800;--green:#39FF14;
      --orange:#FF9933;
      --bg:#0A0E1A;--surface:#0F1526;--surface2:#161E35;
      --border:#1E2D5A;--text:#E8ECF8;--muted:#5A6A99;
      --mono:'Share Tech Mono',monospace;--disp:'Oswald',sans-serif;--body:'Barlow Condensed',sans-serif;
    }
    html,body{background:var(--bg);height:100%;-webkit-tap-highlight-color:transparent;}
    #root{height:100%;}
    .app{font-family:var(--body);background:var(--bg);min-height:100vh;max-width:430px;margin:0 auto;color:var(--text);}
    /* Header */
    .hdr{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 60%,var(--blue-light) 100%);border-bottom:3px solid var(--yellow);position:sticky;top:0;z-index:10;box-shadow:0 2px 20px rgba(0,0,0,.5);}
    .hdr-inner{display:flex;align-items:center;gap:12px;padding:10px 14px;}
    .hdr-logo{width:52px;height:52px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}
    .hdr-text{flex:1;}
    .hdr-title{font-family:var(--disp);font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);line-height:1;}
    .hdr-team{font-family:var(--disp);font-size:13px;font-weight:400;color:#AAC0FF;letter-spacing:1px;margin-top:2px;}
    .hdr-tagline{font-family:var(--mono);font-size:8px;color:rgba(170,192,255,.7);letter-spacing:.5px;margin-top:3px;text-transform:uppercase;}
    .hdr-right{text-align:right;flex-shrink:0;}
    .hdr-stat{font-family:var(--mono);font-size:11px;color:var(--yellow);}
    .hdr-sync{font-family:var(--mono);font-size:9px;margin-top:4px;display:flex;align-items:center;gap:4px;justify-content:flex-end;}
    /* Tabs */
    .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:75px;z-index:9;}
    .tab{flex:1;padding:9px 2px;font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;text-align:center;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
    .tab.on{color:var(--yellow);border-bottom-color:var(--yellow);}
    .tab-badge{display:inline-block;background:var(--orange);color:#000;font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:3px;vertical-align:middle;}
    /* Cards */
    .pg{padding:14px;padding-bottom:40px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden;}
    .ch{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);}
    .ct{font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);}
    .cb{padding:14px;}
    /* Forms */
    .lbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block;}
    .inp{width:100%;background:#070B16;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:16px;padding:10px 12px;border-radius:3px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
    .inp:focus{border-color:var(--yellow);}
    .inp-auto{border-color:rgba(27,58,140,.6);background:#080D1A;}
    .sel{width:100%;background:#070B16;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:15px;padding:10px 12px;border-radius:3px;outline:none;-webkit-appearance:none;appearance:none;}
    .sel:focus{border-color:var(--yellow);}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .fld{margin-bottom:12px;}
    .fld-hint{font-family:var(--mono);font-size:9px;color:rgba(46,85,204,.8);margin-top:3px;letter-spacing:.5px;}
    /* Buttons */
    .btn{width:100%;padding:13px;font-family:var(--disp);font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;transition:all .15s;}
    .btn-a{background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);color:#fff;border:1px solid var(--red-dark);box-shadow:0 2px 8px rgba(196,30,30,.4);}
    .btn-a:disabled{background:#3A1010;color:#7A3030;cursor:not-allowed;box-shadow:none;border-color:#3A1010;}
    .btn-pre{background:linear-gradient(135deg,#002A5A 0%,#003A7A 100%);color:#5BA3FF;border:1px solid #003060;box-shadow:0 2px 8px rgba(0,48,96,.4);}
    .btn-pre:disabled{background:#060E1A;color:#2A4060;cursor:not-allowed;box-shadow:none;border-color:#0A1A30;}
    .btn-post{background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);color:#fff;border:1px solid var(--red-dark);box-shadow:0 2px 8px rgba(196,30,30,.4);}
    .btn-post:disabled{background:#3A1010;color:#7A3030;cursor:not-allowed;box-shadow:none;border-color:#3A1010;}
    .btn-b{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:13px;padding:10px;margin-top:8px;}
    .btn-d{background:transparent;color:var(--red);border:1px solid #3A1020;font-size:12px;padding:7px 12px;width:auto;letter-spacing:1px;font-family:var(--disp);font-weight:600;text-transform:uppercase;border-radius:3px;cursor:pointer;}
    .btn-qr{background:rgba(27,58,140,.4);color:#AAC0FF;border:1px solid rgba(27,58,140,.8);font-size:11px;padding:5px 10px;width:auto;letter-spacing:1px;font-family:var(--disp);font-weight:600;text-transform:uppercase;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;}
    /* Pending records */
    .pending-rec{border:1px solid rgba(255,153,51,.3);border-radius:4px;background:#130D00;margin-bottom:10px;overflow:hidden;}
    .pending-hdr{padding:10px 12px;background:#1A1000;border-bottom:1px solid rgba(255,153,51,.2);display:flex;justify-content:space-between;align-items:center;}
    .pending-bat{font-family:var(--disp);font-size:16px;font-weight:700;letter-spacing:1px;color:var(--orange);}
    .pending-match{font-family:var(--mono);font-size:11px;color:var(--muted);}
    .pending-pre{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 12px;border-bottom:1px solid rgba(255,153,51,.15);}
    .pending-pre-val{font-family:var(--mono);font-size:11px;color:var(--text);margin-top:2px;}
    .pending-post-form{padding:12px;}
    .pending-toggle{width:100%;padding:10px;font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:rgba(255,153,51,.1);color:var(--orange);border:1px solid rgba(255,153,51,.3);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
    .pending-toggle.open{background:rgba(255,153,51,.15);border-color:var(--orange);}
    .pending-time{font-family:var(--mono);font-size:9px;color:var(--muted);}
    /* Records */
    .rec{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
    .rec:last-child{border-bottom:none;}
    .rec:hover,.rec:active{background:var(--surface2);}
    .rec-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .rec-id{font-family:var(--disp);font-size:17px;font-weight:700;letter-spacing:1px;}
    .badge{font-family:var(--mono);font-size:10px;background:rgba(27,58,140,.4);color:var(--yellow);padding:3px 8px;border:1px solid rgba(245,200,0,.3);border-radius:2px;}
    .badge-pre{background:rgba(255,153,51,.15);color:var(--orange);border:1px solid rgba(255,153,51,.3);}
    .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
    .st{background:#070B16;padding:7px 9px;border:1px solid var(--border);border-radius:2px;}
    .sl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
    .sv{font-family:var(--mono);font-size:12px;color:var(--text);margin-top:2px;}
    .sd{font-family:var(--mono);font-size:10px;margin-top:1px;display:block;}
    .pos{color:#39FF14;}.neg{color:#FF5555;}
    /* Fleet */
    .bi{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
    .bi:last-child{border-bottom:none;}
    .bi:hover,.bi:active{background:var(--surface2);}
    .bid{font-family:var(--disp);font-size:18px;font-weight:700;letter-spacing:1px;}
    .bsub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;}
    .hbar-w{height:4px;background:#1A2040;width:80px;margin-top:5px;border-radius:2px;}
    .hbar{height:4px;border-radius:2px;}
    .bi-right{display:flex;align-items:center;gap:8px;}
    /* Misc */
    .empty{text-align:center;padding:40px 20px;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:1px;line-height:2.2;}
    .toast{position:fixed;top:82px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:2px;padding:10px 22px;border-radius:3px;z-index:9999;white-space:nowrap;animation:fio 2.5s forwards;}
    @keyframes fio{0%{opacity:0;top:74px}10%{opacity:1;top:82px}75%{opacity:1}100%{opacity:0;top:82px}}
    .back{background:none;border:none;color:var(--yellow);cursor:pointer;font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1px;padding:0;}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
    .dst{background:#070B16;padding:11px;border:1px solid var(--border);border-radius:2px;}
    /* Overlay */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;}
    .confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:24px;max-width:320px;width:100%;}
    .confirm-logo{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .confirm-logo img{width:36px;height:36px;object-fit:contain;}
    .confirm-title{font-family:var(--disp);font-size:16px;font-weight:700;color:var(--yellow);}
    .confirm-msg{font-family:var(--mono);font-size:12px;color:var(--text);margin-bottom:20px;line-height:1.7;}
    .confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .btn-cancel{background:#0D1020;color:var(--muted);border:1px solid var(--border);padding:11px;font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:3px;cursor:pointer;}
    .btn-del{background:#2A0000;color:#FF5555;border:1px solid #5A1010;padding:11px;font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:3px;cursor:pointer;}
    /* QR Modal */
    .qr-modal{background:var(--surface);border:2px solid var(--yellow);border-radius:8px;max-width:320px;width:100%;overflow:hidden;}
    .qr-modal-hdr{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--yellow);}
    .qr-modal-hdr img{width:36px;height:36px;object-fit:contain;}
    .qr-modal-title{font-family:var(--disp);font-size:18px;font-weight:700;color:var(--yellow);letter-spacing:2px;}
    .qr-modal-sub{font-family:var(--mono);font-size:10px;color:#AAC0FF;margin-top:2px;}
    .qr-modal-body{padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px;}
    .qr-canvas-wrap{background:#fff;padding:12px;border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,.5);}
    .qr-url{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;word-break:break-all;max-width:260px;}
    .qr-modal-footer{display:flex;gap:8px;padding:0 20px 20px;}
    .btn-close-qr{flex:1;background:var(--surface2);color:var(--muted);border:1px solid var(--border);padding:10px;font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:3px;cursor:pointer;}
    .btn-print-qr{flex:1;background:linear-gradient(135deg,var(--blue),var(--blue-light));color:#fff;border:none;padding:10px;font-family:var(--disp);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:3px;cursor:pointer;}
    /* Sync */
    .sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
    .sync-live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
    .sync-off{background:#FF5555;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    /* Loading */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:var(--bg);}
    .loading img{width:90px;height:90px;object-fit:contain;animation:breathe 2s ease-in-out infinite;}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .loading-title{font-family:var(--disp);font-size:22px;font-weight:700;letter-spacing:4px;color:var(--yellow);}
    .loading-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Print */
    .print-all-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;background:rgba(27,58,140,.3);color:#AAC0FF;border:1px solid rgba(27,58,140,.7);font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-radius:3px;cursor:pointer;margin-bottom:12px;}
    /* Footer */
    .sponsor-strip{background:var(--blue-dark);border-top:1px solid rgba(245,200,0,.2);padding:8px 14px;display:flex;align-items:center;gap:8px;}
    .sponsor-strip-logo{width:22px;height:22px;object-fit:contain;opacity:.7;}
    .sponsor-strip-text{font-family:var(--mono);font-size:9px;color:rgba(170,192,255,.5);letter-spacing:1px;text-transform:uppercase;}
    /* Setup */
    .setup-step{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start;}
    .step-num{background:var(--yellow);color:#000;font-family:var(--disp);font-weight:700;font-size:13px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
    .step-text{font-family:var(--mono);font-size:12px;color:var(--text);line-height:1.7;}
    /* Stats */
    .stat-hero{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .stat-hero-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px 12px;display:flex;flex-direction:column;gap:4px;}
    .kpi-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
    .kpi-value{font-family:var(--disp);font-size:28px;font-weight:700;line-height:1;}
    .kpi-sub{font-family:var(--mono);font-size:9px;color:var(--muted);}
    .kpi-yellow{color:var(--yellow);}
    .kpi-blue{color:#5BA3FF;}
    .bar-row{padding:8px 14px;border-bottom:1px solid var(--border);}
    .bar-row:last-child{border-bottom:none;}
    .bar-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
    .bar-name{font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:1px;}
    .bar-val{font-family:var(--mono);font-size:11px;}
    .bar-track{height:6px;background:#1A2040;border-radius:3px;overflow:hidden;}
    .bar-fill{height:6px;border-radius:3px;}
    .bar-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px;}
    .rank-badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:2px;font-weight:700;}
    .rank-ok{background:rgba(57,255,20,.1);color:var(--green);border:1px solid rgba(57,255,20,.3);}
    .rank-1{background:rgba(245,200,0,.15);color:var(--yellow);border:1px solid rgba(245,200,0,.4);}
    .rank-warn{background:rgba(255,85,85,.15);color:#FF5555;border:1px solid rgba(255,85,85,.4);}
    .alert-banner{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
    .alert-banner:last-child{border-bottom:none;}
    .alert-icon{font-size:16px;flex-shrink:0;}
    .alert-text{font-family:var(--mono);font-size:10px;line-height:1.5;}
    .alert-bat{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--yellow);}
    /* Charts */
    .bat-selector{margin:0 14px 12px;display:flex;align-items:center;gap:8px;}
    .bat-selector label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
    .bat-selector select{flex:1;background:#070B16;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:7px 10px;border-radius:3px;outline:none;-webkit-appearance:none;appearance:none;}
    .chart-tabs{display:flex;margin:0 14px 12px;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
    .chart-tab{flex:1;padding:7px 4px;font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;text-align:center;color:var(--muted);border:none;background:var(--surface2);cursor:pointer;transition:all .15s;border-right:1px solid var(--border);}
    .chart-tab:last-child{border-right:none;}
    .chart-tab.on{color:var(--yellow);background:#0A1030;}
    /* Divider */
    .section-divider{display:flex;align-items:center;gap:10px;margin:4px 0 14px;}
    .section-divider span{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
    .section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ── helpers ─────────────────────────────────── */
    const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
    const n2  = v => +v.toFixed(2);
    const n1  = v => +v.toFixed(1);
    function fmtTs(ts){ if(!ts)return""; try{return new Date(ts.toDate?ts.toDate():ts).toLocaleString();}catch{return"";} }
    function fmtTsShort(ts){ if(!ts)return""; try{return new Date(ts.toDate?ts.toDate():ts).toLocaleDateString();}catch{return"";} }
    function fmtTsTime(ts){ if(!ts)return""; try{return new Date(ts.toDate?ts.toDate():ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch{return"";} }
    function irColor(ir){ return ir<15?"#39FF14":ir<20?"#F5C800":"#FF5555"; }
    function voltColor(v){ return v>12.4?"#39FF14":v>12.0?"#F5C800":"#FF5555"; }

    /* Compute next match number for a battery */
    function nextMatchNum(batteryId, records) {
      const batRecs = records.filter(r => r.batteryId === batteryId);
      if (!batRecs.length) return "1";
      const maxMatch = Math.max(...batRecs.map(r => parseInt(r.match)||0));
      return String(maxMatch + 1);
    }

    /* ── Chart Canvas ────────────────────────────── */
    function ChartCanvas({ type, data, options, height=180 }) {
      const ref = useRef(null); const chartRef = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        chartRef.current = new Chart(ref.current, { type, data, options });
        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
      }, [JSON.stringify(data)]);
      return (
        <div style={{position:"relative",height,background:"#070B16",borderRadius:3,border:"1px solid #1E2D5A",padding:"8px 6px 6px"}}>
          <canvas ref={ref}/>
        </div>
      );
    }

    /* ── Chart components (identical to before) ──── */
    function IRChart({ recs }) {
      const sorted = [...recs].reverse();
      const labels = sorted.map((_,i)=>"M"+(i+1));
      const preIR  = sorted.map(r=>r.pre.ir);
      const postIR = sorted.map(r=>r.post.ir);
      const data = { labels, datasets: [
        {label:"Post-Match IR",data:postIR,borderColor:"#F5C800",backgroundColor:"rgba(245,200,0,.08)",pointBackgroundColor:postIR.map(v=>irColor(v)),pointRadius:5,pointHoverRadius:7,borderWidth:2,tension:.3,fill:true},
        {label:"Pre-Match IR",data:preIR,borderColor:"#5BA3FF",backgroundColor:"transparent",pointBackgroundColor:"#5BA3FF",pointRadius:3,borderWidth:1.5,borderDash:[4,3],tension:.3},
        ...(sorted.length?[
          {label:"Watch (15mΩ)",data:Array(sorted.length).fill(15),borderColor:"rgba(245,200,0,.35)",borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false},
          {label:"Replace (20mΩ)",data:Array(sorted.length).fill(20),borderColor:"rgba(255,85,85,.4)",borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false}
        ]:[])
      ]};
      const options = {responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y}mΩ`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9}}},y:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"mΩ"}}}};
      return (<div><ChartCanvas type="line" data={data} options={options} height={190}/><div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 2px 0",fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#F5C800",borderRadius:1,display:"inline-block"}}></span>Post IR</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#5BA3FF",borderRadius:1,display:"inline-block",opacity:.6}}></span>Pre IR</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"rgba(245,200,0,.4)",borderRadius:1,display:"inline-block"}}></span>15mΩ</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"rgba(255,85,85,.5)",borderRadius:1,display:"inline-block"}}></span>20mΩ</span></div></div>);
    }

    function VoltageChart({ recs }) {
      const sorted = [...recs].reverse();
      const labels = sorted.map((_,i)=>"M"+(i+1));
      const data = { labels, datasets: [
        {label:"Pre V",data:sorted.map(r=>r.pre.v),borderColor:"#5BA3FF",backgroundColor:"rgba(91,163,255,.06)",pointBackgroundColor:"#5BA3FF",pointRadius:4,borderWidth:2,tension:.3,fill:true},
        {label:"Post V",data:sorted.map(r=>r.post.v),borderColor:"#F5C800",backgroundColor:"rgba(245,200,0,.06)",pointBackgroundColor:sorted.map(r=>voltColor(r.post.v)),pointRadius:5,borderWidth:2,tension:.3,fill:true},
        ...(sorted.length?[{label:"12.0V floor",data:Array(sorted.length).fill(12.0),borderColor:"rgba(255,85,85,.4)",borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false}]:[])
      ]};
      const options = {responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y}V`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9}}},y:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"V"},min:Math.max(0,Math.min(...sorted.map(r=>r.post.v))-.3)}}};
      return (<div><ChartCanvas type="line" data={data} options={options} height={190}/><div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 2px 0",fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#5BA3FF",display:"inline-block",borderRadius:1}}></span>Pre V</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#F5C800",display:"inline-block",borderRadius:1}}></span>Post V</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"rgba(255,85,85,.5)",display:"inline-block",borderRadius:1}}></span>12.0V</span></div></div>);
    }

    function DrainChart({ recs }) {
      const sorted = [...recs].reverse();
      const labels = sorted.map((_,i)=>"M"+(i+1));
      const drainV   = sorted.map(r=>n2(r.pre.v-r.post.v));
      const drainPct = sorted.map(r=>r.pre.pct-r.post.pct);
      const data = { labels, datasets: [
        {label:"Voltage Drop",data:drainV,backgroundColor:drainV.map(v=>v>.6?"rgba(255,85,85,.7)":v>.4?"rgba(245,200,0,.7)":"rgba(57,255,20,.5)"),borderColor:drainV.map(v=>v>.6?"#FF5555":v>.4?"#F5C800":"#39FF14"),borderWidth:1,borderRadius:2,yAxisID:"yV"},
        {label:"Charge Used",data:drainPct,type:"line",borderColor:"#AAC0FF",backgroundColor:"transparent",pointBackgroundColor:"#AAC0FF",pointRadius:4,borderWidth:1.5,tension:.3,yAxisID:"yP"}
      ]};
      const options = {responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>ctx.datasetIndex===0?` Drop: ${ctx.parsed.y}V`:` Used: ${ctx.parsed.y}%`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9}}},yV:{position:"left",grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"V"}},yP:{position:"right",grid:{drawOnChartArea:false},ticks:{color:"#AAC0FF",font:{size:9},callback:v=>v+"%"}}}};
      return (<div><ChartCanvas type="bar" data={data} options={options} height={190}/><div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 2px 0",fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,background:"rgba(57,255,20,.7)",display:"inline-block",borderRadius:2}}></span>Volt drop (L)</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:2,background:"#AAC0FF",display:"inline-block",borderRadius:1}}></span>Charge % (R)</span></div></div>);
    }

    function FleetIRChart({ batStats }) {
      const sorted = [...batStats].sort((a,b)=>a.avgIR-b.avgIR);
      const data = {labels:sorted.map(b=>b.name),datasets:[{label:"Avg Post IR",data:sorted.map(b=>b.avgIR),backgroundColor:sorted.map(b=>irColor(b.avgIR)+"99"),borderColor:sorted.map(b=>irColor(b.avgIR)),borderWidth:1,borderRadius:3}]};
      const options = {responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.parsed.x}mΩ`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"mΩ"}},y:{grid:{color:"#1A2040"},ticks:{color:"#E8ECF8",font:{size:10,weight:"600"}}}}};
      return <ChartCanvas type="bar" data={data} options={options} height={Math.max(120,sorted.length*36)}/>;
    }

    function FleetVoltageChart({ batStats }) {
      const sorted = [...batStats].sort((a,b)=>b.avgPostV-a.avgPostV);
      const data = {labels:sorted.map(b=>b.name),datasets:[{label:"Avg Post V",data:sorted.map(b=>b.avgPostV),backgroundColor:sorted.map(b=>voltColor(b.avgPostV)+"99"),borderColor:sorted.map(b=>voltColor(b.avgPostV)),borderWidth:1,borderRadius:3}]};
      const options = {responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.parsed.x}V`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9},callback:v=>v+"V"},min:Math.max(0,Math.min(...sorted.map(b=>b.avgPostV))-.3)},y:{grid:{color:"#1A2040"},ticks:{color:"#E8ECF8",font:{size:10,weight:"600"}}}}};
      return <ChartCanvas type="bar" data={data} options={options} height={Math.max(120,sorted.length*36)}/>;
    }

    /* ── Stats Tab ───────────────────────────────── */
    function StatsTab({ batteries, records }) {
      const [selBat, setSelBat]             = useState("");
      const [batChartTab, setBatChartTab]   = useState("ir");
      const [fleetChartTab, setFleetChartTab] = useState("ir");

      // Only use complete records for stats
      const completeRecs = useMemo(() => records.filter(r=>r.status==="complete"||r.post), [records]);

      const batStats = useMemo(() => {
        return batteries.map(bat => {
          const recs = completeRecs.filter(r=>r.batteryId===bat.name);
          if (!recs.length) return {name:bat.name, matches:0};
          return {
            name:bat.name, matches:recs.length,
            avgPostV:n2(avg(recs.map(r=>r.post.v))),
            avgDrainV:n2(avg(recs.map(r=>r.pre.v-r.post.v))),
            avgDrainPct:n1(avg(recs.map(r=>r.pre.pct-r.post.pct))),
            avgIR:n1(avg(recs.map(r=>r.post.ir))),
            lastIR:recs[0].post.ir,
            irTrend:recs.slice(0,8).reverse().map(r=>r.post.ir),
            avgPreV:n2(avg(recs.map(r=>r.pre.v))),
            recs,
          };
        }).filter(b=>b.matches>0).sort((a,b)=>a.avgIR-b.avgIR);
      }, [batteries, completeRecs]);

      const fleetStats = useMemo(() => {
        if (!completeRecs.length) return null;
        return {
          avgDrainV:n2(avg(completeRecs.map(r=>r.pre.v-r.post.v))),
          avgDrainPct:n1(avg(completeRecs.map(r=>r.pre.pct-r.post.pct))),
          avgPostV:n2(avg(completeRecs.map(r=>r.post.v))),
          avgPostIR:n1(avg(completeRecs.map(r=>r.post.ir))),
        };
      }, [completeRecs]);

      const alerts = useMemo(() => {
        const out = [];
        batStats.forEach(b => {
          if (b.irTrend&&b.irTrend.length>=3) { const l=b.irTrend.slice(-3); if(l[2]>l[1]&&l[1]>l[0]) out.push({type:'ir',bat:b.name,val:b.lastIR}); }
          if (b.avgPostV!==null&&b.avgPostV<12.0) out.push({type:'volt',bat:b.name,val:b.avgPostV});
        });
        return out;
      }, [batStats]);

      const selBatRecs = useMemo(() => selBat ? completeRecs.filter(r=>r.batteryId===selBat) : [], [selBat, completeRecs]);
      useEffect(() => { if (!selBat && batStats.length) setSelBat(batStats[0].name); }, [batStats]);

      if (!completeRecs.length) return <div className="empty" style={{paddingTop:60}}>📊<br/>No complete match data yet.<br/>Save post-match readings to see statistics.</div>;

      return (
        <div>
          {alerts.length>0&&(<div className="card" style={{borderColor:"#FF5555"}}><div className="ch" style={{borderColor:"#FF5555"}}><span className="ct" style={{color:"#FF5555"}}>⚠ Alerts ({alerts.length})</span></div>{alerts.map((a,i)=>(<div key={i} className="alert-banner"><div className="alert-icon">{a.type==='ir'?'🔴':'⚡'}</div><div className="alert-text"><div className="alert-bat">{a.bat}</div>{a.type==='ir'?`IR rising 3 matches in a row (${a.val}mΩ) — consider retiring`:`Avg post-match voltage low (${a.val}V)`}</div></div>))}</div>)}

          <div className="card">
            <div className="ch"><span className="ct">Fleet Overview</span></div>
            <div className="cb" style={{paddingBottom:8}}>
              <div className="stat-hero">
                <div className="kpi"><div className="kpi-label">Complete Matches</div><div className="kpi-value kpi-yellow">{completeRecs.length}</div><div className="kpi-sub">{batteries.length} batteries</div></div>
                <div className="kpi"><div className="kpi-label">Avg Post-Match V</div><div className="kpi-value" style={{color:voltColor(fleetStats.avgPostV)}}>{fleetStats.avgPostV}V</div><div className="kpi-sub">across all matches</div></div>
              </div>
              <div className="stat-hero-3">
                <div className="kpi"><div className="kpi-label">Avg Volt Drop</div><div className="kpi-value kpi-blue">{fleetStats.avgDrainV}V</div><div className="kpi-sub">per match</div></div>
                <div className="kpi"><div className="kpi-label">Avg Charge</div><div className="kpi-value kpi-blue">{fleetStats.avgDrainPct}%</div><div className="kpi-sub">used / match</div></div>
                <div className="kpi"><div className="kpi-label">Avg IR</div><div className="kpi-value" style={{color:irColor(fleetStats.avgPostIR),fontSize:22}}>{fleetStats.avgPostIR}mΩ</div><div className="kpi-sub">post-match</div></div>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="ch"><span className="ct">Fleet Comparison</span></div>
            <div className="chart-tabs">{[["ir","⚡ Int Resistance"],["volt","🔋 Post Voltage"],["usage","📊 Match Usage"]].map(([k,lbl])=>(<button key={k} className={"chart-tab"+(fleetChartTab===k?" on":"")} onClick={()=>setFleetChartTab(k)}>{lbl}</button>))}</div>
            <div style={{padding:"0 14px 14px"}}>
              {fleetChartTab==="ir"&&<div><FleetIRChart batStats={batStats}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>Sorted best→worst. Below 15mΩ = healthy. Above 20mΩ = consider replacing.</div></div>}
              {fleetChartTab==="volt"&&<div><FleetVoltageChart batStats={batStats}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>Avg post-match voltage. Consistent &lt;12.0V = tired battery.</div></div>}
              {fleetChartTab==="usage"&&<div><ChartCanvas type="bar" height={Math.max(120,batStats.length*36)} data={{labels:[...batStats].sort((a,b)=>b.matches-a.matches).map(b=>b.name),datasets:[{label:"Matches",data:[...batStats].sort((a,b)=>b.matches-a.matches).map(b=>b.matches),backgroundColor:"rgba(46,85,204,.7)",borderColor:"#2E55CC",borderWidth:1,borderRadius:3}]}} options={{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false},tooltip:{backgroundColor:"#0F1526",borderColor:"#1E2D5A",borderWidth:1,titleColor:"#F5C800",bodyColor:"#E8ECF8",callbacks:{label:ctx=>` ${ctx.parsed.x} matches`}}},scales:{x:{grid:{color:"#1E2D5A"},ticks:{color:"#5A6A99",font:{size:9}}},y:{grid:{color:"#1A2040"},ticks:{color:"#E8ECF8",font:{size:10,weight:"600"}}}}}}/></div>}
            </div>
          </div>

          <div className="card">
            <div className="ch"><span className="ct">Battery Deep Dive</span><span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}>time series</span></div>
            <div className="bat-selector"><label>Battery</label>
              <select value={selBat} onChange={e=>setSelBat(e.target.value)}>
                {batStats.map(b=><option key={b.name} value={b.name}>{b.name} ({b.matches} matches)</option>)}
              </select>
            </div>
            {selBat&&selBatRecs.length>=2?(
              <div>
                {(()=>{const b=batStats.find(x=>x.name===selBat);if(!b)return null;return(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,padding:"0 14px 12px"}}><div className="st" style={{padding:10}}><div className="sl">Avg IR</div><div style={{fontFamily:"var(--mono)",fontSize:16,color:irColor(b.avgIR),marginTop:3}}>{b.avgIR}mΩ</div></div><div className="st" style={{padding:10}}><div className="sl">Avg Post V</div><div style={{fontFamily:"var(--mono)",fontSize:16,color:voltColor(b.avgPostV),marginTop:3}}>{b.avgPostV}V</div></div><div className="st" style={{padding:10}}><div className="sl">Avg Drain</div><div style={{fontFamily:"var(--mono)",fontSize:16,color:"#5BA3FF",marginTop:3}}>{b.avgDrainPct}%</div></div></div>);})()}
                <div className="chart-tabs">{[["ir","⚡ IR Health"],["volt","🔋 Voltage"],["drain","📉 Drain"]].map(([k,lbl])=>(<button key={k} className={"chart-tab"+(batChartTab===k?" on":"")} onClick={()=>setBatChartTab(k)}>{lbl}</button>))}</div>
                <div style={{padding:"0 14px 14px"}}>
                  {batChartTab==="ir"&&<div><IRChart recs={selBatRecs}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>Rising post-match IR over time is the clearest signal of battery aging.</div></div>}
                  {batChartTab==="volt"&&<div><VoltageChart recs={selBatRecs}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>Consistent low post-match voltage indicates degraded capacity.</div></div>}
                  {batChartTab==="drain"&&<div><DrainChart recs={selBatRecs}/><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:8,lineHeight:1.6}}>High drain may indicate heavy robot usage or a weaker battery.</div></div>}
                </div>
              </div>
            ):(
              <div className="empty" style={{padding:"20px 14px"}}>{selBatRecs.length<2?"Need at least 2 complete matches to show charts.":"Select a battery."}</div>
            )}
          </div>

          <div className="card">
            <div className="ch"><span className="ct">Health Ranking</span><span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}>sorted by avg IR</span></div>
            {batStats.map((b,i)=>{
              function irLbl(ir){if(!ir)return null;if(ir<15)return<span className="rank-badge rank-ok">GOOD</span>;if(ir<20)return<span className="rank-badge rank-1">WATCH</span>;return<span className="rank-badge rank-warn">REPLACE</span>;}
              const maxIR=Math.max(...batStats.map(x=>x.avgIR||0),1);
              return(<div key={b.name} className="bar-row"><div className="bar-meta"><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",width:16}}>{i+1}.</span><span className="bar-name">{b.name}</span>{irLbl(b.avgIR)}</div><span className="bar-val" style={{color:irColor(b.avgIR)}}>{b.avgIR}mΩ</span></div><div className="bar-track"><div className="bar-fill" style={{width:(b.avgIR/maxIR*100)+"%",background:irColor(b.avgIR)}}/></div><div className="bar-sub">{b.matches} matches · avg post {b.avgPostV}V · drain {b.avgDrainPct}%</div></div>);
            })}
          </div>
        </div>
      );
    }

    /* ── QR Modal ────────────────────────────────── */
    function QRModal({ batName, onClose }) {
      const qrRef = useRef(null); const url = getBatteryUrl(batName);
      useEffect(()=>{ if(!qrRef.current)return; qrRef.current.innerHTML=''; new QRCode(qrRef.current,{text:url,width:220,height:220,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H}); },[batName]);
      function handlePrint(){const w=window.open('','_blank','width=400,height=520');const qrEl=qrRef.current;const imgSrc=qrEl?(qrEl.querySelector('img')?.src||qrEl.querySelector('canvas')?.toDataURL()||''):'';w.document.write(`<html><head><title>QR — ${batName}</title><style>body{font-family:Arial;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:10px;padding:20px;}.logo{width:65px;height:65px;object-fit:contain;}.team{font-size:12px;font-weight:bold;color:#1B3A8C;letter-spacing:2px;text-transform:uppercase;}.batname{font-size:32px;font-weight:900;color:#000;letter-spacing:3px;}.qr{border:3px solid #1B3A8C;padding:8px;border-radius:6px;}.url{font-size:8px;color:#aaa;word-break:break-all;max-width:240px;text-align:center;}.tagline{font-size:10px;color:#1B3A8C;letter-spacing:1px;}</style></head><body><img src="${LOGO_SRC}" class="logo"/><div class="team">CHARGERS · FRC Team 5409</div><div class="batname">${batName}</div><div class="qr"><img src="${imgSrc}" width="220" height="220"/></div><div class="url">${url}</div><div class="tagline">Scan to log battery data</div><script>window.onload=function(){window.print();}<\/script></body></html>`);w.document.close();}
      return (<div className="overlay" onClick={onClose}><div className="qr-modal" onClick={e=>e.stopPropagation()}><div className="qr-modal-hdr"><img src={LOGO_SRC} alt="SPAM"/><div><div className="qr-modal-title">{batName}</div><div className="qr-modal-sub">Scan to open with battery pre-selected</div></div></div><div className="qr-modal-body"><div className="qr-canvas-wrap" ref={qrRef}></div><div className="qr-url">{url}</div></div><div className="qr-modal-footer"><button className="btn-close-qr" onClick={onClose}>Close</button><button className="btn-print-qr" onClick={handlePrint}>🖨 Print</button></div></div></div>);
    }

    function printAllQR(batteries){const w=window.open('','_blank','width=800,height=900');const cards=batteries.map(bat=>{const url=getBatteryUrl(bat.name);return`<div class="card"><img src="${LOGO_SRC}" class="logo"/><div class="team">CHARGERS · FRC 180</div><div class="batname">${bat.name}</div><div class="qr-ph" data-url="${url}"></div><div class="url">${url}</div><div class="tagline">Scan to log battery data</div></div>`;}).join('');w.document.write(`<html><head><title>FRC 180 — Battery QR Codes</title><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial;background:#fff;padding:20px;}h1{font-size:18px;font-weight:bold;color:#1B3A8C;text-align:center;margin-bottom:4px;letter-spacing:2px;}h2{font-size:10px;color:#888;text-align:center;margin-bottom:20px;}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}.card{border:2px solid #1B3A8C;border-radius:8px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:5px;break-inside:avoid;}.logo{width:42px;height:42px;object-fit:contain;}.team{font-size:8px;font-weight:bold;color:#1B3A8C;letter-spacing:1px;text-transform:uppercase;text-align:center;}.batname{font-size:20px;font-weight:900;color:#000;letter-spacing:2px;}.url{font-size:7px;color:#aaa;word-break:break-all;text-align:center;max-width:150px;}.tagline{font-size:8px;color:#1B3A8C;text-align:center;}</style></head><body><h1>⚡ CHARGERS — FRC Team 5409</h1><h2>BATTERY QR CODE SHEET</h2><div class="grid">${cards}</div><script>window.onload=function(){document.querySelectorAll('.qr-ph').forEach(function(el){new QRCode(el,{text:el.dataset.url,width:130,height:130,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});});setTimeout(function(){window.print();},800);};<\/script></body></html>`);w.document.close();}

    /* ── Confirm Dialog ──────────────────────────── */
    function ConfirmDialog({ message, onConfirm, onCancel }) {
      return (<div className="overlay"><div className="confirm-box"><div className="confirm-logo"><img src={LOGO_SRC} alt="SPAM"/><div className="confirm-title">Confirm Action</div></div><div className="confirm-msg">{message}</div><div className="confirm-btns"><button className="btn-cancel" onClick={onCancel}>Cancel</button><button className="btn-del" onClick={onConfirm}>Delete</button></div></div></div>);
    }

    function Delta({ a, b }) {
      const d = +(b-a).toFixed(3);
      if (d>0) return <span className="sd pos">▲{Math.abs(d)}</span>;
      if (d<0) return <span className="sd neg">▼{Math.abs(d)}</span>;
      return <span className="sd" style={{color:"#2A3560"}}>—</span>;
    }

    /* ── Header ──────────────────────────────────── */
    function Header({ matchCount, pendingCount, online, onBack, backLabel, title, actionBtn }) {
      return (
        <div className="hdr">
          <div className="hdr-inner">
            <img src={LOGO_SRC} className="hdr-logo" alt="CHARGERS"/>
            <div className="hdr-text">
              {onBack ? (
                <div><button className="back" onClick={onBack}>‹ {backLabel||"Back"}</button><div className="hdr-title" style={{fontSize:15,marginTop:2}}>{title}</div></div>
              ) : (
                <div>
                  <div className="hdr-title">⚡ Battery Tracker</div>
                  <div className="hdr-team">CHARGERS · FRC Team 5409</div>
                  <div className="hdr-tagline">Learn Today to Lead Tomorrow</div>
                </div>
              )}
            </div>
            <div className="hdr-right">
              {actionBtn ? actionBtn : (
                <div>
                  <div className="hdr-stat">{matchCount} MATCHES</div>
                  {pendingCount > 0 && <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--orange)",marginTop:2}}>{pendingCount} PENDING POST</div>}
                  <div className="hdr-sync">
                    <span className={"sync-dot "+(online?"sync-live":"sync-off")}></span>
                    <span style={{fontFamily:"var(--mono)",fontSize:9,color:online?"var(--green)":"#FF5555"}}>{online?"LIVE":"OFFLINE"}</span>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ── Pending Post-Match Card ─────────────────── */
    function PendingCard({ rec, onSavePost, saving }) {
      const [open, setOpen]   = useState(false);
      const [postV, setPostV] = useState("");
      const [postPct, setPostPct] = useState("");
      const [postIR, setPostIR]   = useState("");
      const canSave = postV && postPct && postIR;
      return (
        <div className="pending-rec">
          <div className="pending-hdr">
            <div>
              <div className="pending-bat">{rec.batteryId}</div>
              <div className="pending-match">Match {rec.match} · <span className="pending-time">Pre saved {fmtTsTime(rec.ts)}</span></div>
            </div>
            <span className="badge badge-pre">AWAITING POST</span>
          </div>
          {/* Pre-match snapshot */}
          <div className="pending-pre">
            <div className="st"><div className="sl">Pre Voltage</div><div className="pending-pre-val">{rec.pre.v} V</div></div>
            <div className="st"><div className="sl">Pre Charge</div><div className="pending-pre-val">{rec.pre.pct} %</div></div>
            <div className="st"><div className="sl">Pre IR</div><div className="pending-pre-val">{rec.pre.ir} mΩ</div></div>
          </div>
          {/* Post-match entry */}
          <div className="pending-post-form">
            <button className={"pending-toggle"+(open?" open":"")} onClick={()=>setOpen(o=>!o)}>
              {open ? "▲ Cancel" : "▼ Add Post-Match Data"}
            </button>
            {open && (
              <div style={{marginTop:12}}>
                <div className="row3" style={{marginBottom:10}}>
                  <div className="fld">
                    <label className="lbl">Voltage (V)</label>
                    <input className="inp" type="number" inputMode="decimal" step="0.01" placeholder="12.10" value={postV} onChange={e=>setPostV(e.target.value)}/>
                  </div>
                  <div className="fld">
                    <label className="lbl">Charge (%)</label>
                    <input className="inp" type="number" inputMode="numeric" placeholder="72" value={postPct} onChange={e=>setPostPct(e.target.value)}/>
                  </div>
                  <div className="fld">
                    <label className="lbl">Int Res (mΩ)</label>
                    <input className="inp" type="number" inputMode="decimal" step="0.1" placeholder="16.2" value={postIR} onChange={e=>setPostIR(e.target.value)}/>
                  </div>
                </div>
                <button
                  className="btn btn-post"
                  disabled={!canSave || saving}
                  onClick={()=>onSavePost(rec.id, {v:+postV, pct:+postPct, ir:+postIR})}
                >
                  {saving ? "Saving..." : "Save Post-Match ■"}
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── Record Detail ───────────────────────────── */
    function RecordDetail({ record, onBack, onDelete, sharedState }) {
      const {toast,confirm,setConfirm} = sharedState; const r = record;
      const isComplete = r.status==="complete" || r.post;
      return (
        <div className="app">
          {toast&&<div className="toast">{toast}</div>}
          {confirm&&<ConfirmDialog message={confirm.msg} onConfirm={()=>{confirm.fn();setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
          <Header onBack={onBack} backLabel="Back" title={"Match "+r.match+" — "+r.batteryId} actionBtn={<button className="btn-d" onClick={onDelete}>Delete</button>}/>
          <div className="pg">
            <div className="card">
              <div className="ch">
                <span className="ct">{r.batteryId}</span>
                <span className={"badge"+(isComplete?"":" badge-pre")}>
                  {isComplete ? "MATCH "+r.match : "MATCH "+r.match+" · PRE ONLY"}
                </span>
              </div>
              <div className="cb">
                <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",marginBottom:14}}>{fmtTs(r.ts)}</div>
                {isComplete ? (
                  <div>
                    <div className="detail-grid">
                      <div className="dst"><div className="sl">Pre Voltage</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"#5BA3FF",marginTop:4}}>{r.pre.v} V</div></div>
                      <div className="dst"><div className="sl">Post Voltage</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"var(--yellow)",marginTop:4}}>{r.post.v} V</div></div>
                      <div className="dst"><div className="sl">Pre Charge</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"#5BA3FF",marginTop:4}}>{r.pre.pct} %</div></div>
                      <div className="dst"><div className="sl">Post Charge</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"var(--yellow)",marginTop:4}}>{r.post.pct} %</div></div>
                      <div className="dst"><div className="sl">Pre Int Res</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"#5BA3FF",marginTop:4}}>{r.pre.ir} mΩ</div></div>
                      <div className="dst"><div className="sl">Post Int Res</div><div style={{fontFamily:"var(--mono)",fontSize:20,color:"var(--yellow)",marginTop:4}}>{r.post.ir} mΩ</div></div>
                    </div>
                    <div style={{background:"#070B16",border:"1px solid var(--border)",padding:12,borderRadius:3}}>
                      <div className="sl" style={{marginBottom:10,color:"var(--yellow)"}}>Delta (Post − Pre)</div>
                      <div className="sg">
                        <div className="st"><div className="sl">Voltage</div><Delta a={r.pre.v} b={r.post.v}/></div>
                        <div className="st"><div className="sl">Charge %</div><Delta a={r.pre.pct} b={r.post.pct}/></div>
                        <div className="st"><div className="sl">Int Res</div><Delta a={r.pre.ir} b={r.post.ir}/></div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div>
                    <div style={{background:"rgba(255,153,51,.08)",border:"1px solid rgba(255,153,51,.3)",padding:12,borderRadius:3,marginBottom:12,fontFamily:"var(--mono)",fontSize:11,color:"var(--orange)",lineHeight:1.7}}>
                      ⏳ Pre-match data saved. Post-match data has not been entered yet.
                    </div>
                    <div className="sg">
                      <div className="st"><div className="sl">Pre Voltage</div><div style={{fontFamily:"var(--mono)",fontSize:16,color:"#5BA3FF",marginTop:3}}>{r.pre.v} V</div></div>
                      <div className="st"><div className="sl">Pre Charge</div><div style={{fontFamily:"var(--mono)",fontSize:16,color:"#5BA3FF",marginTop:3}}>{r.pre.pct} %</div></div>
                      <div className="st"><div className="sl">Pre IR</div><div style={{fontFamily:"var(--mono)",fontSize:16,color:"#5BA3FF",marginTop:3}}>{r.pre.ir} mΩ</div></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Battery Detail ──────────────────────────── */
    function BatteryDetail({ bid, batDocId, records, onBack, onDelete, onSelectRecord, sharedState }) {
      const {toast,confirm,setConfirm} = sharedState;
      const [qrOpen, setQrOpen] = useState(false);
      const br      = records.filter(r=>r.batteryId===bid);
      const complete = br.filter(r=>r.status==="complete"||r.post);
      const pending  = br.filter(r=>r.status==="pre"&&!r.post);
      const avgV    = complete.length ? n2(avg(complete.map(r=>r.post.v))) : null;
      const avgIR   = complete.length ? n1(avg(complete.map(r=>r.post.ir))) : null;
      return (
        <div className="app">
          {toast&&<div className="toast">{toast}</div>}
          {confirm&&<ConfirmDialog message={confirm.msg} onConfirm={()=>{confirm.fn();setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
          {qrOpen&&<QRModal batName={bid} onClose={()=>setQrOpen(false)}/>}
          <Header onBack={onBack} backLabel="Fleet" title={bid} actionBtn={<button className="btn-d" onClick={onDelete}>Remove</button>}/>
          <div className="pg">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
              <div className="st" style={{padding:12}}><div className="sl">Complete</div><div style={{fontFamily:"var(--mono)",fontSize:26,color:"var(--yellow)"}}>{complete.length}</div></div>
              <div className="st" style={{padding:12}}><div className="sl">Avg Post V</div><div style={{fontFamily:"var(--mono)",fontSize:18,marginTop:4}}>{avgV?avgV+"V":"—"}</div></div>
              <div className="st" style={{padding:12}}><div className="sl">Avg IR</div><div style={{fontFamily:"var(--mono)",fontSize:18,marginTop:4}}>{avgIR?avgIR+"mΩ":"—"}</div></div>
            </div>
            {pending.length > 0 && (
              <div style={{background:"rgba(255,153,51,.08)",border:"1px solid rgba(255,153,51,.3)",borderRadius:4,padding:"8px 12px",marginBottom:12,fontFamily:"var(--mono)",fontSize:10,color:"var(--orange)"}}>
                ⏳ {pending.length} match{pending.length!==1?"es":""} awaiting post-match data
              </div>
            )}
            <div className="card">
              <div className="ch"><span className="ct">QR Code</span></div>
              <div className="cb"><div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)",marginBottom:10,lineHeight:1.6}}>Scan to open with <strong style={{color:"var(--yellow)"}}>{bid}</strong> pre-selected.</div><button className="btn btn-b" style={{borderColor:"rgba(27,58,140,.8)",color:"#AAC0FF",marginTop:0}} onClick={()=>setQrOpen(true)}>📱 Show QR Code / Print</button></div>
            </div>
            <div className="card">
              <div className="ch"><span className="ct">Match History</span></div>
              {br.length===0&&<div className="empty">No matches logged yet</div>}
              {br.map(r=>{
                const isComplete = r.status==="complete"||r.post;
                return(
                  <div key={r.id} className="rec" onClick={()=>onSelectRecord(r)}>
                    <div className="rec-top">
                      <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)"}}>{fmtTsShort(r.ts)}</span>
                      <span className={"badge"+(isComplete?"":" badge-pre")}>MATCH {r.match}{isComplete?"":" · PRE"}</span>
                    </div>
                    {isComplete ? (
                      <div className="sg">
                        <div className="st"><div className="sl">Voltage</div><div className="sv">{r.pre.v}→{r.post.v}</div><Delta a={r.pre.v} b={r.post.v}/></div>
                        <div className="st"><div className="sl">Charge %</div><div className="sv">{r.pre.pct}→{r.post.pct}</div><Delta a={r.pre.pct} b={r.post.pct}/></div>
                        <div className="st"><div className="sl">Int Res</div><div className="sv">{r.pre.ir}→{r.post.ir}</div><Delta a={r.pre.ir} b={r.post.ir}/></div>
                      </div>
                    ) : (
                      <div className="sg">
                        <div className="st"><div className="sl">Pre V</div><div className="sv" style={{color:"#5BA3FF"}}>{r.pre.v} V</div></div>
                        <div className="st"><div className="sl">Pre %</div><div className="sv" style={{color:"#5BA3FF"}}>{r.pre.pct}%</div></div>
                        <div className="st"><div className="sl">Pre IR</div><div className="sv" style={{color:"#5BA3FF"}}>{r.pre.ir}mΩ</div></div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    /* ── Setup Screen ────────────────────────────── */
    function SetupScreen(){
      return(<div className="app"><div className="hdr"><div className="hdr-inner"><img src={LOGO_SRC} className="hdr-logo" alt="CHARGERS"/><div className="hdr-text"><div className="hdr-title">Setup Required</div><div className="hdr-team">CHARGERS · FRC Team 5409</div></div></div></div><div className="pg"><div className="card" style={{borderColor:"var(--yellow)"}}><div className="ch"><span className="ct">Firebase Setup Guide</span></div><div className="cb">{[["Go to console.firebase.google.com and sign in with Google.","1"],["Click \"Create a project\", name it frc180-batteries, finish setup.","2"],["Click the Web icon (</> ), register the app, copy the firebaseConfig.","3"],["Paste the 6 config values into this file where it says PASTE_..._HERE.","4"],["Go to Build → Firestore Database → Create database → Start in test mode.","5"],["Save and upload to Netlify. All devices share live data!","6"]].map(([t,n])=>(<div key={n} className="setup-step"><div className="step-num">{n}</div><div className="step-text">{t}</div></div>))}</div></div></div></div>);
    }

    /* ── Main App ────────────────────────────────── */
    function App() {
      const [tab, setTab]         = useState("log");
      const [batteries, setBats]  = useState([]);
      const [records, setRecs]    = useState([]);
      const [loading, setLoading] = useState(true);
      const [online, setOnline]   = useState(true);
      const [toast, setToast]     = useState(null);
      const [view, setView]       = useState(null);
      const [newBat, setNewBat]   = useState("");
      const [savingPre, setSavingPre]   = useState(false);
      const [savingPost, setSavingPost] = useState(false);
      const [confirm, setConfirm] = useState(null);
      const [qrBat, setQrBat]     = useState(null);

      // Pre-match form
      const [preForm, setPreForm] = useState({
        batteryId: getPreselectedBattery(),
        match:"", v:"", pct:"", ir:""
      });

      // Auto-fill next match number when battery changes
      useEffect(() => {
        if (preForm.batteryId) {
          setPreForm(f => ({ ...f, match: nextMatchNum(preForm.batteryId, records) }));
        }
      }, [preForm.batteryId, records]);

      useEffect(() => { if (getPreselectedBattery()) setTab("log"); }, []);

      useEffect(() => {
        const u1 = db.collection("batteries").orderBy("name")
          .onSnapshot(s=>{setBats(s.docs.map(d=>({id:d.id,...d.data()}))); setOnline(true); setLoading(false);}, ()=>{setOnline(false); setLoading(false);});
        const u2 = db.collection("records").orderBy("ts","desc")
          .onSnapshot(s=>{setRecs(s.docs.map(d=>({id:d.id,...d.data()}))); setOnline(true);}, ()=>setOnline(false));
        return () => { u1(); u2(); };
      }, []);

      function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null), 2600); }
      function askConfirm(msg,fn) { setConfirm({msg,fn}); }
      const sharedState = { toast, confirm, setConfirm };

      async function addBattery() {
        const name = newBat.trim().toUpperCase();
        if (!name || batteries.find(b=>b.name===name)) return;
        try { await db.collection("batteries").add({name, createdAt:firebase.firestore.FieldValue.serverTimestamp()}); setNewBat(""); setPreForm(f=>({...f,batteryId:name})); showToast("Battery added ✓"); }
        catch(e) { showToast("Save error — check Firestore rules"); }
      }

      async function deleteBattery(docId, name) {
        askConfirm("Remove "+name+" from the fleet?", async()=>{
          try { await db.collection("batteries").doc(docId).delete(); setView(null); showToast("Battery removed"); }
          catch(e) { showToast("Delete error"); }
        });
      }

      // Save pre-match only — creates partial record with status:"pre"
      async function savePreMatch() {
        setSavingPre(true);
        try {
          await db.collection("records").add({
            batteryId: preForm.batteryId,
            match:     preForm.match,
            ts:        firebase.firestore.FieldValue.serverTimestamp(),
            status:    "pre",
            pre:       { v:+preForm.v, pct:+preForm.pct, ir:+preForm.ir },
          });
          setPreForm(f => ({ ...f, v:"", pct:"", ir:"" }));
          showToast("Pre-match saved ✓");
        } catch(e) { showToast("Save error — check Firestore rules"); }
        setSavingPre(false);
      }

      // Save post-match — updates existing doc with post data and status:"complete"
      async function savePostMatch(docId, postData) {
        setSavingPost(true);
        try {
          await db.collection("records").doc(docId).update({
            post:       postData,
            status:     "complete",
            postTs:     firebase.firestore.FieldValue.serverTimestamp(),
          });
          showToast("Post-match saved ✓");
        } catch(e) { showToast("Save error — check Firestore rules"); }
        setSavingPost(false);
      }

      async function deleteRecord(docId) {
        askConfirm("Delete this match record?", async()=>{
          try { await db.collection("records").doc(docId).delete(); setView(null); showToast("Record deleted"); }
          catch(e) { showToast("Delete error"); }
        });
      }

      const canSavePre = preForm.batteryId && preForm.match && preForm.v && preForm.pct && preForm.ir;

      // Pending = saved pre-match, no post yet
      const pendingRecs = useMemo(() => records.filter(r => r.status==="pre" && !r.post), [records]);
      const completeRecs = useMemo(() => records.filter(r => r.status==="complete" || r.post), [records]);

      function getBatRecs(n) { return records.filter(r=>r.batteryId===n); }
      function getLastCompleteRec(n) { return completeRecs.find(r=>r.batteryId===n); }
      function hColor(pct) { return pct>60?"#39FF14":pct>30?"#F5C800":"#FF5555"; }

      if (loading) return (
        <div className="app"><div className="loading">
          <img src={LOGO_SRC} alt="CHARGERS"/>
          <div className="loading-title">CHARGERS</div>
          <div className="spinner"/>
          <div className="loading-sub">Connecting to database...</div>
        </div></div>
      );

      if (view && view.type==="rec") return <RecordDetail record={view.data} onBack={()=>setView(view.from?{type:"bat",id:view.from.id,name:view.from.name}:null)} onDelete={()=>deleteRecord(view.data.id)} sharedState={sharedState}/>;
      if (view && view.type==="bat") return <BatteryDetail bid={view.name} batDocId={view.id} records={records} onBack={()=>setView(null)} onDelete={()=>deleteBattery(view.id,view.name)} onSelectRecord={r=>setView({type:"rec",data:r,from:{id:view.id,name:view.name}})} sharedState={sharedState}/>;

      return (
        <div>
          {toast && <div className="toast">{toast}</div>}
          {confirm && <ConfirmDialog message={confirm.msg} onConfirm={()=>{confirm.fn();setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
          {qrBat && <QRModal batName={qrBat} onClose={()=>setQrBat(null)}/>}
          <div className="app">
            <Header matchCount={completeRecs.length} pendingCount={pendingRecs.length} online={online}/>
            <div className="tabs">
              {[
                ["log","📋 Pre"],
                ["post", pendingRecs.length>0 ? <span>⏳ Post<span className="tab-badge">{pendingRecs.length}</span></span> : "⏳ Post"],
                ["batteries","🔋 Battery List"],
                ["history","📊 Battery History"],
                ["stats","📈 Stats"]
              ].map((p,i) => (
                <button key={i} className={"tab"+(tab===["log","post","batteries","history","stats"][i]?" on":"")} onClick={()=>setTab(["log","post","batteries","history","stats"][i])}>{p[1]||p[0]}</button>
              ))}
            </div>

            <div className="pg">

              {/* ── PRE-MATCH LOG ── */}
              {tab==="log" && (
                <div>
                  {/* Instruction banner */}
                  <div style={{background:"rgba(0,48,96,.3)",border:"1px solid rgba(91,163,255,.2)",borderRadius:4,padding:"10px 14px",marginBottom:12,fontFamily:"var(--mono)",fontSize:10,color:"#5BA3FF",lineHeight:1.8}}>
                    📋 <strong>Pre-Match Logger</strong><br/>
                    Fill in pre-match readings and tap Save. Someone else can enter post-match data from the ⏳ Post tab after the match.
                  </div>

                  <div className="card">
                    <div className="ch"><span className="ct">Battery & Match</span></div>
                    <div className="cb">
                      <div className="fld">
                        <label className="lbl">Battery</label>
                        <select className="sel" value={preForm.batteryId} onChange={e=>setPreForm(f=>({...f,batteryId:e.target.value}))}>
                          <option value="">— Select Battery —</option>
                          {batteries.map(b=><option key={b.id} value={b.name}>{b.name}</option>)}
                        </select>
                      </div>
                      <div className="fld">
                        <label className="lbl">Match Number</label>
                        <input
                          className={"inp inp-auto"}
                          type="number" inputMode="numeric"
                          placeholder="auto-filled"
                          value={preForm.match}
                          onChange={e=>setPreForm(f=>({...f,match:e.target.value}))}
                        />
                        <div className="fld-hint">↑ auto-filled from last match — edit if needed</div>
                      </div>
                    </div>
                  </div>

                  <div className="card" style={{borderColor:"#003060"}}>
                    <div className="ch" style={{borderColor:"#003060"}}>
                      <span className="ct" style={{color:"#5BA3FF"}}>Pre-Match Readings</span>
                      <span style={{fontFamily:"var(--mono)",fontSize:10,color:"#5BA3FF"}}>Before robot on field</span>
                    </div>
                    <div className="cb">
                      <div className="row3">
                        <div className="fld">
                          <label className="lbl">Voltage (V)</label>
                          <input className="inp" type="number" inputMode="decimal" step="0.01" placeholder="12.60" value={preForm.v} onChange={e=>setPreForm(f=>({...f,v:e.target.value}))}/>
                        </div>
                        <div className="fld">
                          <label className="lbl">Charge (%)</label>
                          <input className="inp" type="number" inputMode="numeric" placeholder="100" value={preForm.pct} onChange={e=>setPreForm(f=>({...f,pct:e.target.value}))}/>
                        </div>
                        <div className="fld">
                          <label className="lbl">Int Res (mΩ)</label>
                          <input className="inp" type="number" inputMode="decimal" step="0.1" placeholder="15.0" value={preForm.ir} onChange={e=>setPreForm(f=>({...f,ir:e.target.value}))}/>
                        </div>
                      </div>
                      <button className="btn btn-pre" disabled={!canSavePre || savingPre} onClick={savePreMatch}>
                        {savingPre ? "Saving..." : "▶ Save Pre-Match Data"}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* ── POST-MATCH TAB ── */}
              {tab==="post" && (
                <div>
                  <div style={{background:"rgba(255,153,51,.08)",border:"1px solid rgba(255,153,51,.2)",borderRadius:4,padding:"10px 14px",marginBottom:12,fontFamily:"var(--mono)",fontSize:10,color:"var(--orange)",lineHeight:1.8}}>
                    ⏳ <strong>Post-Match Logger</strong><br/>
                    These batteries had pre-match data saved and are waiting for post-match readings.
                  </div>
                  {pendingRecs.length===0 ? (
                    <div className="empty">✅<br/>No pending post-match entries.<br/>All matches are complete.</div>
                  ) : (
                    pendingRecs.map(rec => (
                      <PendingCard key={rec.id} rec={rec} onSavePost={savePostMatch} saving={savingPost}/>
                    ))
                  )}
                </div>
              )}

              {/* ── FLEET ── */}
              {tab==="batteries" && (
                <div>
                  <div className="card">
                    <div className="ch"><span className="ct">Register Battery</span></div>
                    <div className="cb">
                      <div style={{display:"flex",gap:8}}>
                        <input className="inp" style={{flex:1}} placeholder="e.g. BAT-01" value={newBat} onChange={e=>setNewBat(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&addBattery()}/>
                        <button className="btn btn-a" style={{width:"auto",padding:"10px 20px",letterSpacing:1}} onClick={addBattery}>Add</button>
                      </div>
                    </div>
                  </div>
                  {batteries.length>0 && <button className="print-all-btn" onClick={()=>printAllQR(batteries)}>🖨 Print All QR Codes ({batteries.length} batteries)</button>}
                  <div className="card">
                    <div className="ch"><span className="ct">Batteries ({batteries.length})</span></div>
                    {batteries.length===0 && <div className="empty">🔋<br/>No batteries registered.</div>}
                    {batteries.map(bat => {
                      const lr = getLastCompleteRec(bat.name); const pct = lr?lr.post.pct:0; const cnt = completeRecs.filter(r=>r.batteryId===bat.name).length;
                      const pendBat = pendingRecs.filter(r=>r.batteryId===bat.name).length;
                      return (
                        <div key={bat.id} className="bi" onClick={()=>setView({type:"bat",id:bat.id,name:bat.name})}>
                          <div style={{flex:1}}>
                            <div className="bid">{bat.name}{pendBat>0&&<span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--orange)",marginLeft:8}}>⏳{pendBat}</span>}</div>
                            <div className="bsub">{cnt} complete{lr?" · Last: "+lr.post.v+"V · "+lr.post.pct+"%":""}</div>
                            <div className="hbar-w"><div className="hbar" style={{width:pct+"%",background:hColor(pct)}}/></div>
                          </div>
                          <div className="bi-right">
                            <button className="btn-qr" onClick={e=>{e.stopPropagation();setQrBat(bat.name);}}>⬛ QR</button>
                            <span style={{color:"var(--muted)",fontSize:22}}>›</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── HISTORY ── */}
              {tab==="history" && (
                <div className="card">
                  <div className="ch"><span className="ct">All Matches ({records.length})</span>
                    <span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}>{pendingRecs.length} pending</span>
                  </div>
                  {records.length===0 && <div className="empty">📋<br/>No matches logged yet.</div>}
                  {records.map(r => {
                    const isComplete = r.status==="complete"||r.post;
                    return (
                      <div key={r.id} className="rec" onClick={()=>setView({type:"rec",data:r})}>
                        <div className="rec-top">
                          <span className="rec-id">{r.batteryId}</span>
                          <span className={"badge"+(isComplete?"":" badge-pre")}>MATCH {r.match}{isComplete?"":" · PRE"}</span>
                        </div>
                        <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",marginBottom:6}}>{fmtTs(r.ts)}</div>
                        {isComplete ? (
                          <div className="sg">
                            <div className="st"><div className="sl">Voltage</div><div className="sv">{r.pre.v}→{r.post.v}</div><Delta a={r.pre.v} b={r.post.v}/></div>
                            <div className="st"><div className="sl">Charge %</div><div className="sv">{r.pre.pct}→{r.post.pct}</div><Delta a={r.pre.pct} b={r.post.pct}/></div>
                            <div className="st"><div className="sl">Int Res</div><div className="sv">{r.pre.ir}→{r.post.ir}</div><Delta a={r.pre.ir} b={r.post.ir}/></div>
                          </div>
                        ) : (
                          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--orange)"}}>⏳ Pre-match only — awaiting post-match data</div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* ── STATS ── */}
              {tab==="stats" && <StatsTab batteries={batteries} records={records}/>}

            </div>

            <div className="sponsor-strip">
              <img src={LOGO_SRC} className="sponsor-strip-logo" alt=""/>
              <div className="sponsor-strip-text">CHARGERS · 5409 · Template made by FRC Team 180 S.P.A.M.</div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(CONFIG_FILLED ? <App/> : <SetupScreen/>);
